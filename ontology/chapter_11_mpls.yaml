ontology:
  id: chapter-11-mpls
  title: MPLS Design
  version: 2.0.0
  description: Label distribution, forwarding state, VPN services, pseudowires, traffic engineering, fast reroute, control-plane synchronization, underlay dependency, and service impact.

node_labels:
  MPLSDomain: Label-switched transport scope.
  LabelSwitchRouter: Router forwarding packets by MPLS label.
  ProviderRouter: Core provider router carrying MPLS transport without customer VRFs.
  LDP: Label Distribution Protocol process.
  RSVPTE: RSVP traffic-engineering signaling process.
  SegmentRoutingMPLS: Segment-routing MPLS control and forwarding mode.
  Label: Locally significant MPLS forwarding identifier.
  LabelBinding: Binding between a label and forwarding equivalence class.
  FEC: Forwarding equivalence class receiving common label treatment.
  MPLSLSP: MPLS label-switched path through one or more label switch routers.
  LabelSwitchedPath: Summarized forwarding path through an MPLS domain.
  MPLSForwardingTable: MPLS data-plane forwarding table.
  LFIB: Label forwarding information base.
  MPLSService: Customer or internal service transported by MPLS.
  VPWS: Point-to-point virtual private wire service.
  VPLS: Multipoint virtual private LAN service.
  Pseudowire: Emulated Layer 2 circuit across packet transport.
  MPBGPVPNv4: Multiprotocol BGP VPNv4 route distribution.
  MPBGPVPNv6: Multiprotocol BGP VPNv6 route distribution.
  TrafficEngineeringTunnel: Explicit or constrained MPLS traffic-engineering path.
  LDPIGPSynchronization: Mechanism delaying IGP transit use until labels are ready.
  LDPSessionProtection: Mechanism preserving LDP session state across link changes.
  PenultimateHopPopping: Removal of the top label one hop before LSP egress.
  TransportUnderlay: IGP, links, and label transport supporting MPLS services.
  ServiceOverlay: VPN or pseudowire service layer transported by MPLS.
  LabelDistributionProcess: LDP or segment-routing label distribution function.
  TrafficEngineeringPolicy: Path constraint and preference intent.
  FastReroutePolicy: Compatibility label for local protection behavior.
  LDPAdjacency: LDP peer session and discovery state.
  TargetedLDP: Targeted LDP signaling session used by pseudowires.
  L2VPNSignaling: Generic BGP or targeted-LDP L2VPN signaling.
  IGPTEExtensions: IGP traffic-engineering topology and resource advertisements.
  TrafficBlackhole: Forwarding failure where traffic follows a path without usable labels.
  MPLSRisk: Risk caused by label, signaling, policy, protection, or underlay state.

properties:
  MPLSDomain:
    control_plane: {type: string, required: true}
  LDP:
    router_id: {type: string, required: true}
  RSVPTE:
    state: {type: string, required: true}
  Label:
    value: {type: integer, required: true}
  LabelBinding:
    state: {type: string, required: true}
  MPLSLSP:
    state: {type: string, required: true}
  MPLSService:
    service_type: {type: string, required: true}
  Pseudowire:
    state: {type: string, required: true}
  LDPAdjacency:
    state: {type: string, required: true}
  TrafficEngineeringTunnel:
    state: {type: string, required: true}
  TransportUnderlay:
    state: {type: string, required: true}
  MPLSRisk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}

relationship_types:
  CREATED_BY: {from: [LabelBinding], to: [LDP, RSVPTE, SegmentRoutingMPLS], description: Label binding is originated by label distribution or TE control plane.}
  BINDS_LABEL: {from: [LabelBinding], to: [Label], description: Binding assigns a local MPLS label.}
  BINDS_FEC: {from: [LabelBinding], to: [FEC], description: Binding maps forwarding equivalence class to label.}
  FEC_FOR_PREFIX: {from: [FEC], to: [Prefix], description: FEC represents summarized prefix reachability.}
  HAS_LDP_ADJACENCY: {from: [LDP, LabelSwitchRouter, ProviderEdge, ProviderRouter], to: [LDPAdjacency], description: MPLS router or LDP process owns adjacency.}
  HAS_FORWARDING_TABLE: {from: [LabelSwitchRouter, ProviderEdge, ProviderRouter], to: [MPLSForwardingTable, LFIB], description: Router owns MPLS data-plane table.}
  CONTAINS_LABEL_BINDING: {from: [MPLSForwardingTable, LFIB], to: [LabelBinding], description: Forwarding table contains installed label binding.}
  IMPORTS_VPN_ROUTE: {from: [RouteTarget], to: [VPNRoute], description: Route target makes VPN route eligible for import.}
  IMPORTS_INTO: {from: [RouteTarget], to: [VRF], description: Route target imports matching route into VRF.}
  EXPORTED_WITH: {from: [VPNRoute], to: [RouteTarget], description: VPN route carries export route target.}
  TARGETS_VRF: {from: [VPNRoute], to: [VRF], description: VPN route is intended for customer VRF.}
  HAS_VPN_ROUTE: {from: [MPLSService, MPLSL3VPN], to: [VPNRoute], description: MPLS VPN service owns customer route.}
  CARRIES_PREFIX: {from: [VPNRoute], to: [Prefix], description: VPN route carries customer prefix.}
  HAS_TRANSPORT_LSP: {from: [MPLSService, MPLSL3VPN, MPLSL2VPN, VPWS, VPLS, ServiceOverlay], to: [LSP, MPLSLSP, LabelSwitchedPath], description: Service overlay uses MPLS transport path.}
  HAS_PSEUDOWIRE: {from: [MPLSService, MPLSL2VPN, VPWS, VPLS], to: [Pseudowire], description: Layer 2 service is realized by pseudowire.}
  USES_SIGNALING: {from: [Pseudowire], to: [TargetedLDP, L2VPNSignaling], description: Pseudowire uses explicit signaling control plane.}
  HAS_IGP_REACHABILITY: {from: [Prefix, FEC, LDPAdjacency], to: [IGPReachability], description: Object has summarized IGP reachability state.}
  PREVENTS: {from: [LDPIGPSynchronization], to: [TrafficBlackhole], description: Synchronization prevents unlabeled transit after IGP convergence.}
  USES_PHP: {from: [LSP, MPLSLSP, LabelSwitchedPath], to: [PenultimateHopPopping], description: Path uses penultimate-hop label removal.}
  MEMBER_OF_MPLS_DOMAIN: {from: [LabelSwitchRouter, ProviderEdge, ProviderRouter, LDP, RSVPTE, SegmentRoutingMPLS], to: [MPLSDomain], description: Router or control plane participates in MPLS domain.}
  HAS_UNDERLAY: {from: [MPLSDomain, LSP, MPLSLSP, LabelSwitchedPath], to: [TransportUnderlay], description: MPLS domain or path uses transport underlay.}
  CARRIES_OVERLAY: {from: [LSP, MPLSLSP, LabelSwitchedPath], to: [ServiceOverlay, MPLSService], description: Transport path carries service overlay.}
  SUPPORTS_MPLS_STATE: {from: [Evidence], to: [LabelBinding, LSP, MPLSLSP, LDPAdjacency, RouteTarget, Pseudowire, TrafficEngineeringTunnel, LDPIGPSynchronization, TransportUnderlay], description: Evidence supports MPLS diagnostic state.}
  EXPOSES_MPLS_RISK: {from: [MPLSService, MPLSL3VPN, Pseudowire, LDPAdjacency, TrafficEngineeringTunnel, TransportUnderlay], to: [MPLSRisk], description: MPLS service or control state exposes risk.}
  PARTICIPATES_IN_MPLS: {from: [Device], to: [MPLSDomain], description: Device forwards labels in domain.}
  ESTABLISHES: {from: [LabelDistributionProcess, LDP, RSVPTE, SegmentRoutingMPLS], to: [LabelSwitchedPath, LSP, MPLSLSP], description: Control plane creates label-switched path.}
  ENGINEERED_BY: {from: [LabelSwitchedPath, LSP, MPLSLSP], to: [TrafficEngineeringPolicy, TrafficEngineeringTunnel], description: Policy or tunnel constrains path.}
  PROTECTED_WITH: {from: [LabelSwitchedPath, LSP, MPLSLSP], to: [FastReroutePolicy, FastReroute], description: Path has local repair.}
  TRANSPORTS: {from: [LabelSwitchedPath, LSP, MPLSLSP], to: [VPNService, MPLSService, BusinessService], description: Label path carries service.}

