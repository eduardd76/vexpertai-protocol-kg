dependency_rules:
  - id: mpls-service-lsp
    source: MPLSService
    relationship: DEPENDS_ON
    target: [LSP]
    rationale: Customer service requires a usable label-switched transport path.
  - id: lsp-label-binding
    source: LSP
    relationship: DEPENDS_ON
    target: [LabelBinding]
    rationale: LSP forwarding requires installed label bindings.
  - id: label-binding-control-plane
    source: LabelBinding
    relationship: CREATED_BY
    target: [LDP, RSVPTE, SegmentRoutingMPLS]
    rationale: Label lineage identifies its distributing control plane.
  - id: ldp-adjacency-igp
    source: LDPAdjacency
    relationship: DEPENDS_ON
    target: [IGPReachability]
    rationale: LDP discovery and transport require reachable peer addresses.
  - id: mpls-l3vpn-components
    source: MPLSL3VPN
    relationship: DEPENDS_ON
    target: [VRF, RouteDistinguisher, RouteTarget, MPBGPVPNv4, MPBGPVPNv6, LSP]
    rationale: L3VPN requires separation, policy, route distribution, and label transport.
  - id: route-target-route-import
    source: RouteTarget
    relationship: IMPORTS_VPN_ROUTE
    target: [VPNRoute]
    rationale: Route target determines VPN route import eligibility.
  - id: pseudowire-signaling
    source: Pseudowire
    relationship: DEPENDS_ON
    target: [TargetedLDP, L2VPNSignaling]
    rationale: Pseudowire state requires a functioning signaling plane.
  - id: ldp-igp-blackhole-prevention
    source: LDPIGPSynchronization
    relationship: PREVENTS
    target: [TrafficBlackhole]
    rationale: IGP metric suppression avoids forwarding before labels converge.
  - id: traffic-engineering-dependencies
    source: TrafficEngineeringTunnel
    relationship: DEPENDS_ON
    target: [RSVPTE, IGPTEExtensions]
    rationale: RSVP-TE requires signaling and TE topology advertisements.
  - id: fast-reroute-lsp-protection
    source: FastReroute
    relationship: PROTECTS
    target: [LSP]
    rationale: Local repair protects the transport path during failure.
  - id: business-mpls-service
    source: BusinessService
    relationship: DEPENDS_ON
    target: [MPLSService]
    rationale: Business impact traces through the MPLS service.

risk_rules:
  - id: vpn-route-without-label-path
    applies_to: MPLSService
    when: VPN route is present but transport LSP has no installed label binding
    severity: critical
    response: Restore label forwarding before changing VPN route policy.
  - id: ldp-down-igp-up
    applies_to: LDPAdjacency
    when: IGP peer reachability is up but LDP adjacency is down
    severity: critical
    response: Validate discovery, transport address, ACL, and session state.
  - id: route-target-mismatch-mpls
    applies_to: RouteTarget
    when: exported route target is not imported by intended customer VRF
    severity: critical
    response: Correct import/export policy and validate tenant isolation.
  - id: pseudowire-signaling-down
    applies_to: Pseudowire
    when: pseudowire is down because targeted LDP or L2VPN signaling is unavailable
    severity: high
    response: Restore signaling before changing attachment-circuit configuration.
  - id: missing-te-extension
    applies_to: TrafficEngineeringTunnel
    when: RSVP signaling is active but IGP TE extension state is missing
    severity: high
    response: Restore TE advertisements and validate constrained path computation.

validation_queries:
  - id: lsp-without-label-binding
    description: Find MPLS paths with no label binding.
    cypher: |
      MATCH (lsp:MPLSLSP)
      WHERE NOT (lsp)-[:DEPENDS_ON]->(:LabelBinding)
      RETURN lsp.id, lsp.name, lsp.state
  - id: ldp-down-with-igp-up
    description: Find failed LDP adjacencies whose IGP reachability remains up.
    cypher: |
      MATCH (adjacency:LDPAdjacency)-[:DEPENDS_ON]->(igp:IGPReachability)
      WHERE adjacency.state = 'down' AND igp.state = 'up'
      RETURN adjacency.id, adjacency.name
  - id: route-target-not-imported
    description: Find VPN routes whose export target is not imported by intended VRF.
    cypher: |
      MATCH (route:VPNRoute)-[:EXPORTED_WITH]->(target:RouteTarget)
      MATCH (route)-[:TARGETS_VRF]->(vrf:VRF)
      WHERE NOT (vrf)-[:IMPORTS]->(target)
      RETURN route.id, target.value, vrf.name

example_scenarios:
  - id: vpn-route-no-label
    summary: VPN control-plane route exists without usable label path.
  - id: ldp-adjacency-divergence
    summary: IGP stays up while LDP adjacency is down.
  - id: route-target-import-mismatch
    summary: Export target does not match intended VRF import.
  - id: pseudowire-signaling-failure
    summary: VPWS pseudowire fails because targeted LDP is down.
  - id: rsvp-te-igp-extension
    summary: RSVP-TE path computation depends on IGP TE advertisements.
  - id: ldp-igp-synchronization
    summary: Synchronization suppresses transit until label forwarding converges.
