  title: QoS and WAN Interaction
  version: 1.0.0
  description: WAN QoS protects application SLA during congestion.
node_labels: {}
properties: {}
relationship_types:
  QOS_POLICY_PROTECTS_APPLICATION_SLA: {from: [QoSPolicy], to: [SLA, SLARequirement], description: QoS policy protects application performance objective.}
constraints: []
dependency_rules:
  - {id: qos-sla-protection, source: QoSPolicy, relationship: QOS_POLICY_PROTECTS_APPLICATION_SLA, target: [SLA], rationale: WAN classification and queueing protect service SLA.}
risk_rules:
  - {id: qos-classification-gap, applies_to: QoSPolicy, when: critical application remains best effort during congestion, severity: high, response: Correct classification and validate interface policy.}
validation_queries:
