dependency_rules:
  - id: isis-process-device
    source: ISISProcess
    relationship: RUNS_ON
    target: [Device, ISISRouter]
    rationale: Process must resolve to its hosting router.
  - id: isis-process-level
    source: ISISProcess
    relationship: HAS_LEVEL
    target: [ISISLevel, Level1, Level2]
    rationale: Flooding and reachability scope depend on level participation.
  - id: isis-adjacency-interface
    source: ISISAdjacency
    relationship: FORMED_OVER
    target: [Interface, ISISInterface]
    rationale: Adjacency state traces to the participating interface.
  - id: isis-area-device
    source: ISISArea
    relationship: CONTAINS
    target: [Device]
    rationale: Area membership bounds Level 1 reachability.
  - id: isis-lsp-origin
    source: LSP
    relationship: GENERATED_BY
    target: [ISISRouter]
    rationale: LSP lineage identifies its advertising system.
  - id: isis-tlv-advertisement
    source: ISISTLV
    relationship: ADVERTISES
    target: [Prefix, Capability]
    rationale: Reachability and capabilities trace to their TLVs.
  - id: isis-l1-to-l2-leaking
    source: Level1Route
    relationship: LEAKED_TO
    target: [Level2]
    rationale: Selected Level 1 reachability can be exposed to Level 2.
  - id: isis-l2-to-l1-leaking
    source: Level2Route
    relationship: LEAKED_TO
    target: [Level1]
    rationale: Selected external reachability requires explicit Level 1 leaking.
  - id: isis-overload-transit
    source: OverloadBit
    relationship: SUPPRESSES
    target: [TransitRole]
    rationale: Overloaded router remains reachable but is not valid transit.
  - id: isis-segment-routing-extension
    source: SegmentRouting
    relationship: DEPENDS_ON
    target: [SegmentRoutingExtension]
    rationale: Segment routing depends on IS-IS capability and SID advertisements.
  - id: isis-prefix-sid-advertisement
    source: PrefixSID
    relationship: ADVERTISED_BY
    target: [ISISTLV]
    rationale: SID presence traces to its prefix-SID TLV.
  - id: isis-reachability-adjacency
    source: Reachability
    relationship: DEPENDS_ON
    target: [ISISAdjacency]
    rationale: Underlay reachability exposes its adjacency dependency.
  - id: isis-overlay-underlay
    source: MPLSOverlay
    relationship: DEPENDS_ON
    target: [ISISUnderlay]
    rationale: MPLS service continuity depends on IS-IS underlay reachability.
  - id: isis-sr-overlay-underlay
    source: SegmentRoutingOverlay
    relationship: DEPENDS_ON
    target: [ISISUnderlay]
    rationale: SR policy and services depend on IS-IS underlay and SID state.

risk_rules:
  - id: missing-level-leak
    applies_to: RouteLeakingPolicy
    when: required Level 2 prefix has no policy permitting it into Level 1
    severity: high
    response: Add a scoped leaking policy and validate return reachability.
  - id: overload-transit-loss
    applies_to: OverloadBit
    when: overloaded router is the only path between required nodes
    severity: critical
    response: Restore alternate transit or clear overload only after validation.
  - id: isis-adjacency-underlay-loss
    applies_to: ISISAdjacencyRisk
    when: adjacency loss removes the MPLS or SR underlay path
    severity: critical
    response: Restore adjacency before changing overlay policy.
  - id: missing-prefix-sid-tlv
    applies_to: PrefixSID
    when: SID is expected but has no ADVERTISED_BY TLV or capability
    severity: high
    response: Restore SR capability and prefix-SID advertisement.
  - id: dis-election-instability
    applies_to: ISISBroadcastSegment
    when: DIS changes repeatedly within the observation window
    severity: high
    response: Stabilize priority, interface, and segment membership.

validation_queries:
  - id: level2-prefix-without-level1-leak
    description: Find required Level 2 prefixes with no leak into Level 1.
    cypher: |
      MATCH (route:Level2Route)-[:REPRESENTS_PREFIX]->(prefix:Prefix)
      WHERE prefix.required_in_level1 = true
        AND NOT (route)-[:LEAKED_TO]->(:Level1)
      RETURN prefix.id, prefix.cidr
  - id: overloaded-transit-router
    description: Find routers whose overload bit suppresses transit.
    cypher: |
      MATCH (router:ISISRouter)-[:HAS_OVERLOAD_BIT]->(bit:OverloadBit)
            -[:SUPPRESSES]->(role:TransitRole)
      WHERE bit.set = true
      RETURN router.id, router.name, role.name
  - id: sid-without-advertisement
    description: Find SIDs missing an IS-IS TLV advertisement.
    cypher: |
      MATCH (sid)
      WHERE (sid:PrefixSID OR sid:NodeSID OR sid:AdjacencySID)
        AND NOT (sid)-[:ADVERTISED_BY]->(:ISISTLV)
      RETURN sid.id, sid.name

example_scenarios:
  - id: missing-level-leaking
    summary: Level 1 cannot reach a required external prefix visible only in Level 2.
  - id: overload-bit-transit
    summary: Router remains reachable but is suppressed as a transit node.
  - id: isis-underlay-adjacency-loss
    summary: Adjacency failure breaks MPLS and segment-routing overlay reachability.
  - id: missing-prefix-sid
    summary: Missing capability or TLV removes an expected Prefix-SID.
  - id: dis-instability
    summary: Repeated DIS election changes pseudonode and adjacency state.
