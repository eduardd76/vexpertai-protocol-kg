ontology:
  id: chapter-04-isis
  title: IS-IS Design
  version: 2.0.0
  description: IS-IS hierarchy, adjacency, LSP and TLV lineage, route leaking, overload, multi-topology, and segment-routing dependencies.

node_labels:
  ISISProcess: IS-IS routing instance.
  ISISLevel: Level 1 or Level 2 flooding scope.
  Level1: Intra-area IS-IS level.
  Level2: Inter-area IS-IS backbone level.
  Level1Level2Router: Router participating in both levels and connecting area reachability.
  ISISArea: IS-IS area identified by an area address.
  NET: Network entity title identifying area and system.
  SystemID: Six-byte IS-IS system identifier.
  ISISAdjacency: Summarized IS-IS neighbor state.
  ISISInterface: Interface participating in IS-IS.
  DIS: Designated intermediate system role on a broadcast segment.
  Pseudonode: Logical node representing an IS-IS broadcast LAN.
  ISISLSP: IS-IS link-state PDU generated by a router or pseudonode.
  TLV: Generic type-length-value advertisement carried in an LSP.
  ISISTLV: IS-IS TLV with semantic capability or reachability meaning.
  MetricStyle: Metric encoding strategy.
  NarrowMetric: Legacy six-bit IS-IS metric style.
  WideMetric: Extended IS-IS metric style.
  OverloadBit: LSP signal suppressing use of a router for transit.
  TransitRole: Eligibility to forward traffic between other nodes.
  RouteLeakingPolicy: Policy moving selected reachability between IS-IS levels.
  IPv6Topology: IPv6 reachability topology carried by IS-IS.
  MultiTopologyISIS: Separate topology calculations per address family or class.
  SingleTopologyISIS: Shared topology for multiple address families.
  SegmentRoutingExtension: IS-IS capability and TLVs supporting segment routing.
  SegmentRouting: Segment-routing control and forwarding intent.
  PrefixSID: Segment identifier attached to a prefix.
  NodeSID: Prefix SID representing a router node.
  AdjacencySID: Segment identifier representing a local adjacency.
  ISISRouter: Router participating in an IS-IS process.
  ISISBroadcastSegment: Multiaccess IS-IS network electing a DIS.
  Capability: Advertised protocol capability.
  Level1Route: Route visible in Level 1.
  Level2Route: Route visible in Level 2.
  ISISUnderlay: IS-IS reachability supporting MPLS or segment-routing transport.
  MPLSOverlay: MPLS service layer depending on routed underlay.
  SegmentRoutingOverlay: Segment-routing service or policy layer.
  ISISAdjacencyRisk: Risk caused by unstable or missing IS-IS adjacency.

properties:
  ISISProcess:
    system_id: {type: string, required: true}
  ISISLevel:
    level: {type: string, required: true}
  ISISArea:
    area_address: {type: string, required: true}
  NET:
    value: {type: string, required: true}
  SystemID:
    value: {type: string, required: true}
  ISISAdjacency:
    state: {type: string, required: true}
    peer_system_id: {type: string, required: true}
  ISISInterface:
    state: {type: string, required: true}
  ISISLSP:
    sequence: {type: integer, required: true}
    lifetime: {type: integer, required: true}
  TLV:
    type: {type: integer, required: true}
  MetricStyle:
    style: {type: string, required: true}
  OverloadBit:
    set: {type: boolean, required: true}
  PrefixSID:
    sid: {type: integer, required: true}
  ISISAdjacencyRisk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}

relationship_types:
  HAS_LEVEL: {from: [ISISProcess], to: [ISISLevel, Level1, Level2], description: Process participates in an IS-IS flooding level.}
  HAS_NET: {from: [ISISProcess, ISISRouter], to: [NET], description: Process or router uses a network entity title.}
  HAS_SYSTEM_ID: {from: [NET, ISISRouter], to: [SystemID], description: Entity resolves to its system identifier.}
  HAS_ISIS_ADJACENCY: {from: [ISISProcess, ISISRouter], to: [ISISAdjacency], description: Process or router owns an adjacency.}
  GENERATED_BY: {from: [LSP, ISISLSP], to: [ISISRouter, Pseudonode], description: IS-IS LSP originates from router or pseudonode.}
  HAS_TLV: {from: [LSP, ISISLSP], to: [TLV, ISISTLV], description: IS-IS LSP contains an advertised TLV.}
  LEAKED_TO: {from: [Level1Route, Level2Route], to: [Level1, Level2], description: Route is selectively made visible in another level.}
  LEAKED_BY: {from: [Level1Route, Level2Route], to: [RouteLeakingPolicy], description: Route movement is governed by policy.}
  CONTROLS_PREFIX: {from: [RouteLeakingPolicy, SummarizationPolicy, RouteMap, PrefixList, Policy], to: [Prefix], description: Routing policy controls prefix visibility.}
  SUPPRESSES: {from: [OverloadBit], to: [TransitRole], description: Overload signal removes router from transit selection.}
  HAS_OVERLOAD_BIT: {from: [ISISRouter], to: [OverloadBit], description: Router advertises overload state.}
  USES_METRIC_STYLE: {from: [ISISProcess], to: [MetricStyle, NarrowMetric, WideMetric], description: Process selects metric encoding.}
  HAS_TOPOLOGY: {from: [ISISProcess, MultiTopologyISIS, SingleTopologyISIS], to: [IPv6Topology], description: IS-IS mode carries IPv6 topology.}
  HAS_SR_EXTENSION: {from: [ISISProcess], to: [SegmentRoutingExtension], description: Process advertises segment-routing capability.}
  REQUIRES_CAPABILITY: {from: [PrefixSID, NodeSID, AdjacencySID], to: [Capability], description: SID requires advertised IS-IS capability.}
  REPRESENTS_PREFIX: {from: [Level1Route, Level2Route, SuccessorRoute, FeasibleSuccessorRoute, SummaryRoute], to: [Prefix, SpecificPrefix], description: Route object carries or summarizes prefix reachability.}
  ISIS_ROLE_ON: {from: [DIS], to: [ISISRouter], description: Elected DIS role is hosted by router.}
  CREATES_PSEUDONODE: {from: [DIS], to: [Pseudonode], description: DIS generates broadcast pseudonode representation.}
  ISIS_ATTACHED_TO: {from: [ISISInterface], to: [ISISBroadcastSegment], description: Interface participates in broadcast segment.}
  EXPOSES_ISIS_RISK: {from: [ISISAdjacency, DIS, ISISBroadcastSegment], to: [ISISAdjacencyRisk], description: IS-IS state exposes adjacency or election risk.}

