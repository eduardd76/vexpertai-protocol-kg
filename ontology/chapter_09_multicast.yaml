dependency_rules:
  - id: receiver-group-membership
    source: Receiver
    relationship: JOINS
    target: [MulticastGroup]
    rationale: Receiver reachability starts with explicit group membership.
  - id: igmp-receiver-membership
    source: IGMP
    relationship: SIGNALS
    target: [Receiver, ReceiverMembership]
    rationale: IGMP state distinguishes receiver signaling from routed-tree failure.
  - id: pim-tree-construction
    source: PIMProcess
    relationship: BUILDS
    target: [MulticastTree]
    rationale: PIM adjacency and policy construct the distribution tree.
  - id: sparse-mode-rp
    source: PIMSparseMode
    relationship: DEPENDS_ON
    target: [RendezvousPoint]
    rationale: Sparse-mode shared-tree discovery requires a valid RP.
  - id: ssm-source-specific-join
    source: PIMSSM
    relationship: DEPENDS_ON
    target: [SourceSpecificJoin]
    rationale: SSM forwarding requires the receiver to name source and group.
  - id: rpf-unicast-table
    source: RPFCheck
    relationship: DEPENDS_ON
    target: [UnicastRoutingTable]
    rationale: RPF selects its incoming path from unicast routing state.
  - id: multicast-route-pim-neighbor
    source: MulticastRoute
    relationship: DEPENDS_ON
    target: [PIMNeighbor]
    rationale: Multicast state may require an upstream PIM adjacency.
  - id: application-group
    source: MulticastApplication
    relationship: DEPENDS_ON
    target: [MulticastGroup]
    rationale: Application impact traces to required multicast groups.
  - id: anycast-rp-state
    source: AnycastRP
    relationship: DEPENDS_ON
    target: [MSDP, SharedState]
    rationale: Anycast RP nodes require source-active or equivalent shared state.
  - id: boundary-group-filter
    source: MulticastBoundary
    relationship: FILTERS
    target: [MulticastGroup]
    rationale: Boundary policy determines whether a group crosses a scope.
  - id: business-multicast-application
    source: BusinessService
    relationship: DEPENDS_ON
    target: [MulticastApplication]
    rationale: Business impact follows the multicast application dependency.

risk_rules:
  - id: rpf-failure-after-join
    applies_to: RPFCheck
    when: receiver membership is active but source traffic fails reverse-path validation
    severity: critical
    response: Repair the unicast route or selected RPF interface before changing IGMP.
  - id: missing-sparse-rp-mapping
    applies_to: RPMapping
    when: sparse-mode group has no usable group-to-RP mapping
    severity: high
    response: Restore RP mapping distribution and verify registration and joins.
  - id: incomplete-ssm-source-join
    applies_to: SourceSpecificJoin
    when: one required source-specific join is missing or denied
    severity: high
    response: Validate IGMPv3 source membership and source reachability.
  - id: boundary-filters-required-group
    applies_to: MulticastBoundary
    when: deny range overlaps a business-required multicast group
    severity: critical
    response: Correct boundary scope and validate that only intended groups cross.
  - id: pim-neighbor-service-impact
    applies_to: PIMNeighbor
    when: failed adjacency owns multicast state for a critical application
    severity: critical
    response: Restore adjacency and validate tree and OIL reconstruction.

validation_queries:
  - id: joined-receiver-with-failed-rpf
    description: Find joined receivers whose multicast route fails RPF.
    cypher: |
      MATCH (receiver:Receiver)-[:JOINS]->(group:MulticastGroup)
      MATCH (route:MulticastRoute)-[:HAS_RPF_CHECK]->(check:RPFCheck {state: 'failed'})
      MATCH (route)-[:HAS_TREE]->(:MulticastTree)<-[:HAS_TREE]-(group)
      RETURN receiver.id, group.group_address, check.name
  - id: sparse-group-without-rp
    description: Find sparse-mode mappings with no usable RP.
    cypher: |
      MATCH (mode:PIMSparseMode)-[:HAS_RP_MAPPING]->(mapping:RPMapping)
      WHERE mapping.state <> 'active' OR NOT (mapping)-[:MAPS_TO_RP]->()
      RETURN mode.id, mapping.id, mapping.state
  - id: application-on-failed-pim-neighbor
    description: Find multicast applications whose route depends on a failed PIM neighbor.
    cypher: |
      MATCH (application:MulticastApplication)-[:DEPENDS_ON]->(group:MulticastGroup)
      MATCH (route:MulticastRoute)-[:DEPENDS_ON]->(neighbor:PIMNeighbor {state: 'down'})
      WHERE route.group_address = group.group_address
      RETURN application.id, group.group_address, neighbor.name

example_scenarios:
  - id: receiver-rpf-failure
    summary: Receiver membership succeeds but traffic fails reverse-path validation.
  - id: sparse-rp-mapping-missing
    summary: Sparse-mode group has no usable RP mapping.
  - id: partial-ssm-source-reachability
    summary: One SSM source-specific join forwards while another fails.
  - id: multicast-boundary-filter
    summary: Boundary policy denies a group required by an application.
  - id: market-data-pim-adjacency
    summary: PIM adjacency loss removes market-data multicast state.
