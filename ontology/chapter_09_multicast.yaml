ontology:
  id: chapter-09-multicast
  title: Multicast Design
  version: 2.0.0
  description: Receiver membership, PIM trees, rendezvous-point mapping, source-specific joins, reverse-path forwarding, boundaries, resiliency, and service impact.

node_labels:
  MulticastDomain: Bounded multicast control and forwarding domain.
  MulticastGroup: Group address with application and policy meaning.
  Receiver: Endpoint subscribing to multicast traffic.
  MulticastSource: Compatibility label for a multicast source.
  MulticastReceiver: Compatibility label for a multicast receiver.
  IGMP: Receiver-membership signaling process.
  IGMPVersion: IGMP protocol version and behavior.
  PIMProcess: Protocol Independent Multicast routing process.
  PIMDenseMode: Flood-and-prune PIM forwarding mode.
  PIMSparseMode: Rendezvous-point-based PIM forwarding mode.
  PIMSSM: Source-specific multicast PIM mode.
  PIMBidir: Bidirectional shared-tree PIM mode.
  RendezvousPoint: Shared-tree rendezvous function.
  RPMapping: Group-range-to-RP mapping and summarized state.
  BootstrapRouter: Bootstrap mechanism distributing RP candidates.
  AutoRP: Cisco Auto-RP discovery and announcement mechanism.
  SharedTree: Receiver-to-RP multicast tree.
  SourceTree: Shortest-path tree rooted at a source.
  MulticastTree: Generic multicast distribution tree.
  RPFCheck: Reverse-path-forwarding validation for a source or RP.
  RPFInterface: Interface selected toward a source or RP.
  UnicastRoutingTable: Unicast routing context used for RPF selection.
  UnicastRoute: Summarized unicast route controlling RPF resolution.
  MulticastRoute: Semantic multicast forwarding state for a source and group.
  OIL: Outgoing interface list for multicast forwarding state.
  PIMNeighbor: PIM adjacency required to build and maintain multicast state.
  MulticastBoundary: Policy boundary limiting multicast group scope.
  AnycastRP: Redundant rendezvous-point address implemented by multiple routers.
  MSDP: Multicast Source Discovery Protocol state synchronization.
  SharedState: Shared source-active or RP synchronization state.
  SourceSpecificJoin: Receiver request for one source and one group.
  ReceiverMembership: Summarized IGMP membership state.
  MulticastApplication: Application consuming one or more multicast groups.
  IPTVService: Multicast application delivering television content.
  MarketDataService: Low-latency multicast market-data application.
  RPFPolicy: Reverse-path forwarding selection intent.
  MulticastRisk: Risk caused by membership, RP, RPF, tree, adjacency, or boundary state.

properties:
  MulticastGroup:
    group_address: {type: string, required: true}
  Source:
    address: {type: string, required: true}
  Receiver:
    address: {type: string, required: true}
  IGMPVersion:
    version: {type: string, required: true}
  PIMProcess:
    mode: {type: string, required: true}
  RendezvousPoint:
    address: {type: string, required: true}
  RPMapping:
    state: {type: string, required: true}
  RPFCheck:
    state: {type: string, required: true}
  MulticastRoute:
    state: {type: string, required: true}
  PIMNeighbor:
    state: {type: string, required: true}
  MulticastBoundary:
    action: {type: string, required: true}
  MulticastRisk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}

relationship_types:
  USES_RP: {from: [MulticastDomain, PIMSparseMode, PIMBidir], to: [RendezvousPoint, AnycastRP], description: Multicast domain or PIM mode uses rendezvous function.}
  SENDS_TO: {from: [Source, MulticastSource], to: [MulticastGroup], description: Source transmits traffic to group.}
  JOINS: {from: [Receiver, MulticastReceiver], to: [MulticastGroup], description: Receiver subscribes to group.}
  SIGNALS: {from: [IGMP], to: [Receiver, MulticastReceiver, ReceiverMembership], description: IGMP signals receiver membership.}
  BUILDS: {from: [PIMProcess, PIMDenseMode, PIMSparseMode, PIMSSM, PIMBidir], to: [MulticastTree, SharedTree, SourceTree], description: PIM mode builds distribution tree.}
  HAS_VERSION: {from: [IGMP], to: [IGMPVersion], description: Membership process uses IGMP version.}
  RUNS_PIM: {from: [MulticastDomain], to: [PIMProcess, PIMDenseMode, PIMSparseMode, PIMSSM, PIMBidir], description: Domain runs multicast routing mode.}
  HAS_RP_MAPPING: {from: [MulticastDomain, PIMSparseMode, PIMBidir], to: [RPMapping], description: Domain or mode resolves group-to-RP mapping.}
  MAPS_GROUP: {from: [RPMapping], to: [MulticastGroup], description: RP mapping covers group or group range.}
  MAPS_TO_RP: {from: [RPMapping], to: [RendezvousPoint, AnycastRP], description: Mapping resolves group range to rendezvous point.}
  DISTRIBUTES_RP_MAPPING: {from: [BootstrapRouter, AutoRP], to: [RPMapping], description: Discovery mechanism distributes RP mapping.}
  HAS_TREE: {from: [MulticastRoute, MulticastGroup], to: [MulticastTree, SharedTree, SourceTree], description: Forwarding state or group uses tree.}
  HAS_RPF_CHECK: {from: [MulticastRoute], to: [RPFCheck], description: Multicast route is admitted by reverse-path check.}
  USES_RPF_INTERFACE: {from: [RPFCheck], to: [RPFInterface], description: Reverse-path check selects incoming interface.}
  CONTAINS_UNICAST_ROUTE: {from: [UnicastRoutingTable], to: [UnicastRoute], description: Routing table contains summarized route used for RPF.}
  USES_UNICAST_ROUTE: {from: [RPFCheck], to: [UnicastRoute], description: Reverse-path check resolves through unicast route.}
  HAS_OIL: {from: [MulticastRoute], to: [OIL], description: Multicast forwarding state has outgoing interface list.}
  FORWARDS_TO: {from: [OIL, MulticastRoute], to: [Interface, Receiver, MulticastReceiver], description: Multicast state forwards toward interface or receiver.}
  HAS_PIM_NEIGHBOR: {from: [PIMProcess, PIMDenseMode, PIMSparseMode, PIMSSM, PIMBidir], to: [PIMNeighbor], description: PIM process owns adjacency.}
  SPECIFIES_SOURCE: {from: [SourceSpecificJoin], to: [Source, MulticastSource], description: Source-specific join selects source.}
  TARGETS_GROUP: {from: [SourceSpecificJoin, ReceiverMembership], to: [MulticastGroup], description: Membership or source-specific join targets group.}
  SYNCHRONIZES_WITH: {from: [AnycastRP], to: [MSDP, SharedState], description: Anycast RP synchronizes source-active or shared state.}
  USES_RPF_POLICY: {from: [MulticastDomain], to: [RPFPolicy], description: Domain applies reverse-path intent.}
  SERVES_MULTICAST: {from: [MulticastGroup], to: [BusinessService], description: Group directly supports business service.}
  SUPPORTS_MULTICAST_STATE: {from: [Evidence], to: [Receiver, ReceiverMembership, RPMapping, RPFCheck, PIMNeighbor, MulticastBoundary], description: Evidence supports multicast diagnostic state.}
  EXPOSES_MULTICAST_RISK: {from: [MulticastDomain, MulticastGroup, RPMapping, RPFCheck, MulticastRoute, MulticastBoundary, PIMNeighbor], to: [MulticastRisk], description: Multicast object exposes service or forwarding risk.}

