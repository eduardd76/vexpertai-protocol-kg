ontology:
  id: chapter-01-layer2
  title: Layer 2, STP, and FHRP Module
  version: 2.0.0
  description: Ethernet segmentation, VLAN transport, STP, loop protection, link aggregation, FHRP, and access design tradeoffs.
node_labels:
  EthernetSegment: Shared Ethernet forwarding segment.
  Switch: Device performing Layer 2 forwarding.
  BridgeDomain: Bounded MAC learning and flooding domain.
  Trunk: Interface carrying multiple tagged VLANs.
  AccessPort: Edge interface assigned to one data VLAN.
  PortChannel: Logical interface composed of member interfaces.
  LAG: Link aggregation control and forwarding group.
  MLAG: Multichassis link aggregation domain.
  STPInstance: Spanning-tree calculation for one VLAN set.
  STPRegion: Shared multiple-spanning-tree configuration region.
  STPRootBridge: Elected root role for an STP instance.
  STPBlockedPort: Port placed in a non-forwarding state by STP.
  BPDU: Summarized spanning-tree protocol message.
  PortFast: Edge-port rapid transition control.
  RootGuard: Control preventing unexpected root placement.
  LoopGuard: Control preventing alternate ports from incorrectly forwarding.
  BPDUGuard: Control shutting an edge port after a BPDU.
  BPDUFilter: Control suppressing BPDU transmission or reception.
  VTPDomain: VLAN distribution administrative domain.
  NativeVLAN: Untagged VLAN behavior on a trunk.
  FirstHopRedundancyGroup: Shared default-gateway service.
  FHRPGroup: Canonical first-hop redundancy group used by interaction views.
  HSRPGroup: HSRP first-hop redundancy group.
  VRRPGroup: VRRP first-hop redundancy group.
  GLBPGroup: GLBP load-sharing gateway group.
  VirtualIP: Shared first-hop IP address.
  VirtualMAC: Shared first-hop MAC address.
  DefaultGateway: Gateway service consumed by endpoints.
  FHRPActiveGateway: Active forwarding role for HSRP or VRRP.
  FHRPStandbyGateway: Standby forwarding role for HSRP or VRRP.
  ActiveVirtualGateway: GLBP member assigning virtual forwarders.
  ActiveVirtualForwarder: GLBP member forwarding for a virtual MAC.
  STPRootPlacement: Intended location of an STP root.
  VLANHoppingRisk: Risk of unintended VLAN access through tagging ambiguity.
  UnidirectionalLinkFailure: Failure where traffic or control messages pass in one direction.
  Layer2Risk: Design or operational risk in a Layer 2 domain.
  AccessLayer: Endpoint-facing network layer.
  DistributionLayer: Policy, aggregation, gateway, and STP boundary.
  LoopFreeL2Design: Layer 2 access design with one logical forwarding path.
  LoopedL2Design: Layer 2 access design using STP to block redundant paths.
  RoutedAccessDesign: Access design using Layer 3 links above the access switch.
properties:
  Switch:
    layer_role: {type: string, required: true}
  VLAN:
    vlan_id: {type: integer, required: true}
    active_endpoints: {type: integer, required: true}
  Trunk:
    allowed_vlans: {type: list, required: true}
    unused_vlans: {type: list, required: true}
  AccessPort:
    status: {type: string, required: true}
  STPInstance:
    instance_id: {type: integer, required: true}
    mode: {type: string, required: true}
  STPBlockedPort:
    reason: {type: string, required: true}
  NativeVLAN:
    vlan_id: {type: integer, required: true}
    status: {type: string, required: true}
  Layer2Risk:
    severity: {type: string, required: true}
  LoopFreeL2Design:
    suitability_score: {type: integer, required: true}
  LoopedL2Design:
    suitability_score: {type: integer, required: true}
  RoutedAccessDesign:
    suitability_score: {type: integer, required: true}
relationship_types:
  CARRIED_BY: {from: [VLAN], to: [Trunk], description: Trunk permits the VLAN across a link.}
  MAPPED_TO: {from: [VLAN], to: [STPInstance, VNI], description: VLAN maps to a loop-control or overlay identifier.}
  ELECTS: {from: [STPInstance, BroadcastSegment, ISISBroadcastSegment], to: [STPRootBridge, DR, BDR, DIS], description: Control domain elects the role used by its forwarding topology.}
  BLOCKS: {from: [STPInstance], to: [Interface, STPBlockedPort], description: STP prevents forwarding on a port to remove a loop.}
  AGGREGATES: {from: [PortChannel, LAG], to: [Interface], description: Logical bundle contains physical interface.}
  SPANS: {from: [MLAG], to: [Device, Switch], description: MLAG control domain spans switches.}
  PROVIDES: {from: [FHRPGroup, FirstHopRedundancyGroup, HSRPGroup, VRRPGroup, GLBPGroup], to: [DefaultGateway], description: Redundancy group supplies gateway service.}
  ACTIVE_ON: {from: [FHRPGroup, HSRPGroup, VRRPGroup, GLBPGroup], to: [Device], description: FHRP group has active forwarding role on device.}
  STANDBY_ON: {from: [FHRPGroup, HSRPGroup, VRRPGroup], to: [Device], description: FHRP group has standby forwarding role on device.}
  HAS_ACTIVE_GATEWAY: {from: [HSRPGroup, VRRPGroup], to: [FHRPActiveGateway], description: Group assigns active forwarding role.}
  HAS_STANDBY_GATEWAY: {from: [HSRPGroup, VRRPGroup], to: [FHRPStandbyGateway], description: Group assigns standby forwarding role.}
  HAS_AVG: {from: [GLBPGroup], to: [ActiveVirtualGateway], description: GLBP group has active virtual gateway.}
  HAS_AVF: {from: [GLBPGroup], to: [ActiveVirtualForwarder], description: GLBP group has active virtual forwarder.}
  HAS_VIRTUAL_IP: {from: [FirstHopRedundancyGroup, HSRPGroup, VRRPGroup, GLBPGroup, DefaultGateway], to: [VirtualIP], description: Gateway object owns shared IP.}
  HAS_VIRTUAL_MAC: {from: [FirstHopRedundancyGroup, HSRPGroup, VRRPGroup, GLBPGroup, DefaultGateway, ActiveVirtualForwarder], to: [VirtualMAC], description: Gateway object owns shared MAC.}
  SHOULD_ALIGN_WITH: {from: [STPRootBridge], to: [FHRPGroup, FHRPActiveGateway], description: STP and active gateway roles should be colocated for the VLAN.}
  MAY_ENABLE: {from: [NativeVLAN], to: [VLANHoppingRisk], description: Native VLAN mismatch can enable unintended tag interpretation.}
  RECEIVED_ON: {from: [BPDU], to: [AccessPort, Trunk], description: Port received summarized BPDU observation.}
  TRIGGERS: {from: [BPDU], to: [BPDUGuard], description: BPDU activates edge-port protection.}
  SHUTS_DOWN: {from: [BPDUGuard], to: [AccessPort], description: Guard err-disables protected port.}
  HAS_NATIVE_VLAN: {from: [Trunk], to: [NativeVLAN], description: Trunk uses VLAN for untagged frames.}
  MISMATCHED_WITH: {from: [NativeVLAN], to: [NativeVLAN], description: Opposite trunk ends use different native VLANs.}
  ROLE_ON: {from: [STPRootBridge, FHRPActiveGateway, FHRPStandbyGateway, ActiveVirtualGateway, ActiveVirtualForwarder], to: [Switch], description: Logical role is hosted on switch.}
  MEMBER_OF_REGION: {from: [STPInstance, Switch], to: [STPRegion], description: Object participates in STP region.}
  MEMBER_OF_VTP: {from: [Switch], to: [VTPDomain], description: Switch participates in a VLAN distribution domain.}
  CONTROLS_BRIDGE_DOMAIN: {from: [STPInstance], to: [BridgeDomain], description: STP instance protects bridge domain from loops.}
  EXTENDS: {from: [BridgeDomain, VLAN], to: [EthernetSegment], description: Layer 2 domain reaches Ethernet segment.}
  USES_FEATURE: {from: [AccessPort, Trunk], to: [PortFast, BPDUFilter, BPDUGuard, RootGuard, LoopGuard], description: Port enables Layer 2 protection or behavior.}
  USES_FHRP: {from: [VLAN], to: [FirstHopRedundancyGroup, HSRPGroup, VRRPGroup, GLBPGroup], description: VLAN uses redundancy group for its default gateway.}
  EXPOSES_RISK: {from: [STPRootBridge, AccessPort, NativeVLAN, LoopedL2Design], to: [Layer2Risk], description: Layer 2 state or design exposes a modeled risk.}
  CONTAINS_SWITCH: {from: [AccessLayer, DistributionLayer], to: [Switch], description: Hierarchical layer contains switch.}
