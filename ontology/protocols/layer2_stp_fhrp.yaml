dependency_rules:
  - id: vlan-trunk-transport
    source: VLAN
    relationship: CARRIED_BY
    target: [Trunk]
    rationale: VLAN reachability depends on explicit trunk allowance.
  - id: vlan-stp-control
    source: VLAN
    relationship: MAPPED_TO
    target: [STPInstance]
    rationale: Each extended VLAN needs an explicit loop-control instance.
  - id: stp-root-election
    source: STPInstance
    relationship: ELECTS
    target: [STPRootBridge]
    rationale: Root placement determines forwarding direction and blocked links.
  - id: access-vlan-membership
    source: AccessPort
    relationship: BELONGS_TO
    target: [VLAN]
    rationale: Endpoint attachment must trace to its broadcast domain.
  - id: fhrp-default-gateway
    source: HSRPGroup
    relationship: PROVIDES
    target: [DefaultGateway]
    rationale: Gateway availability is provided by an explicit redundancy group.
  - id: stp-fhrp-alignment
    source: STPRootBridge
    relationship: SHOULD_ALIGN_WITH
    target: [FHRPActiveGateway]
    rationale: Colocation avoids unnecessary Layer 2 transit for routed traffic.
  - id: bpduguard-access-protection
    source: BPDUGuard
    relationship: PROTECTS
    target: [AccessPort]
    rationale: Edge ports should fail closed when they receive unexpected BPDUs.
  - id: rootguard-placement-protection
    source: RootGuard
    relationship: PROTECTS
    target: [STPRootPlacement]
    rationale: Root guard preserves intended root location.
  - id: loopguard-unidirectional-protection
    source: LoopGuard
    relationship: PROTECTS
    target: [UnidirectionalLinkFailure]
    rationale: Loop guard prevents a blocked path from forwarding after BPDU loss.
  - id: l2-service-failure-scope
    source: BusinessService
    relationship: DEPENDS_ON
    target: [VLAN]
    rationale: Layer 2 service impact follows the VLAN and its failure domain.
risk_rules:
  - id: stp-fhrp-misalignment
    applies_to: STPRootBridge
    when: root role and FHRP active role resolve to different switches
    severity: medium
    response: Align roles or document the intentional transit path.
  - id: unexpected-bpdu-on-access-port
    applies_to: AccessPort
    when: a BPDU is received on a PortFast edge port
    severity: high
    response: Shut the port with BPDU guard and investigate cabling or attached switching.
  - id: native-vlan-mismatch
    applies_to: NativeVLAN
    when: opposite ends of a trunk use different native VLAN IDs
    severity: critical
    response: Restore native VLAN consistency and restrict unused VLANs.
  - id: oversized-bridge-domain
    applies_to: BridgeDomain
    when: broadcast domain crosses unrelated failure zones
    severity: high
    response: Reduce domain size or document the operational reason for extension.
validation_queries:
  - id: stp-fhrp-role-misalignment
    description: Find VLANs where STP root and active gateway resolve to different switches.
    cypher: |
      MATCH (vlan:VLAN)-[:MAPPED_TO]->(stp:STPInstance)-[:ELECTS]->(root:STPRootBridge)-[:ROLE_ON]->(root_switch:Switch)
      MATCH (vlan)<-[:BELONGS_TO]-(:AccessPort)
      MATCH (group:HSRPGroup)-[:HAS_ACTIVE_GATEWAY]->(active:FHRPActiveGateway)-[:ROLE_ON]->(active_switch:Switch)
      WHERE group.vlan_id = vlan.vlan_id AND root_switch <> active_switch
      RETURN vlan.vlan_id, root_switch.name, active_switch.name
  - id: access-ports-without-bpduguard
    description: Find active edge ports without BPDU guard protection.
    cypher: |
      MATCH (port:AccessPort {status: 'up'})
      WHERE NOT (:BPDUGuard)-[:PROTECTS]->(port)
      RETURN port.id, port.name
  - id: native-vlan-mismatches
    description: Find native VLAN objects with an explicit mismatch.
    cypher: |
      MATCH (left:NativeVLAN)-[:MISMATCHED_WITH]->(right:NativeVLAN)
      RETURN left.id, left.vlan_id, right.id, right.vlan_id
  - id: trunks-with-unused-vlans
    description: Find trunks permitting VLANs with no active endpoints.
    cypher: |
      MATCH (vlan:VLAN)-[:CARRIED_BY]->(trunk:Trunk)
      WHERE vlan.active_endpoints = 0
      RETURN trunk.id, collect(vlan.vlan_id) AS unused_vlans
example_scenarios:
  - id: stp-hsrp-misalignment
    summary: STP root and HSRP active roles on different distribution switches create unnecessary transit.
  - id: bpduguard-edge-shutdown
    summary: An unexpected BPDU triggers guard protection and shuts an access port.
  - id: native-vlan-hopping-risk
    summary: A native VLAN mismatch creates ambiguous tagging and a VLAN hopping risk.
  - id: access-design-comparison
    summary: Compare looped Layer 2, loop-free Layer 2, and routed access using failure scope and operational complexity.
