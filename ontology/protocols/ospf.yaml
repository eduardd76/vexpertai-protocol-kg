dependency_rules:
  - id: ospf-process-device
    source: OSPFProcess
    relationship: RUNS_ON
    target: [Device, OSPFRouter]
    rationale: Process identity must resolve to its hosting router.
  - id: ospf-process-area
    source: OSPFProcess
    relationship: CONTAINS
    target: [OSPFArea]
    rationale: Process hierarchy explicitly contains its areas.
  - id: ospf-area-interface
    source: OSPFArea
    relationship: CONTAINS
    target: [OSPFInterface]
    rationale: Interface area membership controls adjacency and flooding.
  - id: ospf-neighbor-interface
    source: OSPFNeighbor
    relationship: FORMED_OVER
    target: [OSPFInterface]
    rationale: Adjacency state depends on interface behavior.
  - id: ospf-broadcast-election
    source: BroadcastSegment
    relationship: ELECTS
    target: [DR, BDR]
    rationale: Multiaccess adjacency topology depends on stable elected roles.
  - id: ospf-abr-backbone
    source: ABR
    relationship: CONNECTS
    target: [OSPFArea, BackboneArea]
    rationale: Inter-area reachability requires area-zero connectivity.
  - id: ospf-asbr-external
    source: ASBR
    relationship: REDISTRIBUTES
    target: [ExternalRoute]
    rationale: External route lineage identifies the importing ASBR.
  - id: ospf-area-lsa-restriction
    source: StubArea
    relationship: RESTRICTS
    target: [LSAType]
    rationale: Area type determines external LSA visibility.
  - id: ospf-summary-boundary
    source: SummarizationPolicy
    relationship: APPLIED_ON
    target: [ABR, ASBR]
    rationale: Summary behavior belongs to an explicit boundary.
  - id: ospf-prefix-lsa-lineage
    source: Prefix
    relationship: ADVERTISED_BY
    target: [LSA]
    rationale: Important prefix visibility traces to a specific LSA.
  - id: ospf-route-lsa-dependency
    source: Route
    relationship: DEPENDS_ON
    target: [LSA]
    rationale: Installed route depends on its link-state input.
  - id: ospf-reachability-neighbor
    source: Reachability
    relationship: DEPENDS_ON
    target: [OSPFNeighbor]
    rationale: Reachability exposes its adjacency dependency.
  - id: ospf-convergence-spf
    source: OSPFConvergence
    relationship: DEPENDS_ON
    target: [SPFComputation]
    rationale: Recovery behavior depends on SPF scheduling and duration.
  - id: ospf-bgp-route-map-control
    source: RedistributionPolicy
    relationship: CONTROLLED_BY
    target: [RouteMap]
    rationale: OSPF-to-BGP route movement is governed by explicit policy.

risk_rules:
  - id: missing-backbone-connectivity
    applies_to: ABR
    when: non-backbone area has no active ABR connection to area zero
    severity: critical
    response: Restore area-zero adjacency or redesign the area boundary.
  - id: area-type-external-filter
    applies_to: StubArea
    when: required external route relies on type 5 propagation
    severity: high
    response: Change area type or provide an intentional default route.
  - id: unstable-dr-bdr
    applies_to: BroadcastSegment
    when: DR or BDR role changes repeatedly within the observation window
    severity: high
    response: Stabilize priority, interface state, and segment membership.
  - id: overbroad-summary
    applies_to: SummarizationPolicy
    when: required more-specific prefix is suppressed without alternate reachability
    severity: critical
    response: Correct summary scope and validate the required prefix end to end.

validation_queries:
  - id: nonbackbone-area-without-active-abr
    description: Find non-backbone areas with no active ABR connection to area zero.
    cypher: |
      MATCH (area:OSPFArea)
      WHERE NOT area:BackboneArea
        AND NOT (:ABR {status: 'up'})-[:CONNECTS]->(area)
      RETURN area.id, area.name
  - id: area-denies-required-lsa
    description: Find required external routes blocked by an area restriction.
    cypher: |
      MATCH (area:OSPFArea)-[restriction:RESTRICTS]->(type:LSAType)
      MATCH (route:ExternalRoute)-[:CARRIED_BY_LSA]->(:LSA)-[:HAS_LSA_TYPE]->(type)
      WHERE restriction.action = 'deny' AND route.required = true
      RETURN area.id, route.name, type.name
  - id: unfiltered-ospf-bgp-policy
    description: Find OSPF-to-BGP policy without a route-map.
    cypher: |
      MATCH (policy:RedistributionPolicy {direction: 'OSPF-to-BGP'})
      WHERE NOT (policy)-[:CONTROLLED_BY]->(:RouteMap)
      RETURN policy.id, policy.name

example_scenarios:
  - id: missing-area-zero
    summary: Missing backbone connectivity removes inter-area reachability.
  - id: wrong-stub-type
    summary: Stub area restrictions prevent required external LSA propagation.
  - id: ospf-bgp-filter
    summary: Route-map policy filters an OSPF-originated BGP route.
  - id: dr-bdr-churn
    summary: Repeated DR and BDR election destabilizes broadcast-segment adjacencies.
  - id: bad-summary
    summary: An overbroad ABR summary suppresses a required more-specific prefix.
