ontology:
  id: chapter-03-ospf
  title: OSPF Protocol Module
  version: 2.0.0
  description: OSPF hierarchy, adjacency, LSA lineage, convergence, protection, summarization, and redistribution dependencies.

node_labels:
  OSPFArea: OSPF link-state flooding and hierarchy scope.
  BackboneArea: Area zero connecting inter-area reachability.
  NormalArea: Area accepting intra-area, inter-area, and external LSAs.
  StubArea: Area restricting external LSAs and using a default route.
  TotallyStubbyArea: Area restricting external and inter-area summaries except a default.
  NSSAArea: Stub-like area allowing local external injection as type 7 LSAs.
  TotallyNSSAArea: NSSA restricting inter-area summaries except a default.
  OSPFRouter: Router participating in an OSPF process.
  OSPFNeighbor: Summarized OSPF adjacency state and peer identity.
  DR: Designated-router role on a multiaccess segment.
  BDR: Backup-designated-router role on a multiaccess segment.
  OSPFInterface: Interface participating in an OSPF area.
  OSPFNetworkType: Broadcast, point-to-point, NBMA, or point-to-multipoint behavior.
  LSA: Generic link-state advertisement with semantic lineage.
  LSAType: LSA category permitted or restricted by area type.
  RouterLSA: Type 1 router topology advertisement.
  NetworkLSA: Type 2 multiaccess network advertisement.
  SummaryLSA: Type 3 or 4 inter-area summary advertisement.
  ASBR: Router role importing reachability from another domain.
  ABR: Router role connecting area zero to another area.
  ExternalLSA: Type 5 external reachability advertisement.
  NSSALSA: Type 7 NSSA external advertisement.
  OpaqueLSA: Extensible OSPF advertisement used by additional capabilities.
  OSPFMetric: OSPF path preference or accumulated metric.
  Cost: Interface or route cost used by SPF.
  DefaultRouteInjection: Intent to advertise a default into a constrained area.
  SPFComputation: Shortest-path calculation and scheduling state.
  LFA: Loop-free alternate next hop.
  OSPFAdjacencyRisk: Risk caused by unstable, missing, or incompatible adjacency state.
  BroadcastSegment: Multiaccess network where OSPF elects DR and BDR.
  ExternalRoute: Reachability imported from another routing source.
  Reachability: Summarized ability to reach a prefix or service endpoint.
  OSPFConvergence: Recovery objective and observed summarized state.
  InternalReachability: Summarized IGP reachability provided by OSPF.
  BGPNextHopReachability: Reachability required to resolve a BGP next hop.

properties:
  OSPFProcess:
    process_id: {type: integer, required: true}
    router_id: {type: string, required: true}
  OSPFArea:
    area_id: {type: string, required: true}
    area_type: {type: string, required: true}
  OSPFNeighbor:
    state: {type: string, required: true}
    peer_router_id: {type: string, required: true}
  OSPFInterface:
    address: {type: string, required: true}
    state: {type: string, required: true}
  OSPFNetworkType:
    network_type: {type: string, required: true}
  LSA:
    lsa_type: {type: integer, required: true}
    advertising_router: {type: string, required: true}
  OSPFMetric:
    value: {type: integer, required: true}
  Cost:
    value: {type: integer, required: true}
  SPFComputation:
    duration_ms: {type: integer, required: true}
  OSPFAdjacencyRisk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}

relationship_types:
  FORMED_OVER: {from: [OSPFNeighbor, ISISAdjacency, EIGRPNeighbor], to: [Interface, OSPFInterface, ISISInterface, EIGRPInterface], description: Neighbor adjacency uses its participating interface.}
  CONNECTS: {from: [ABR, VPNService], to: [OSPFArea, BackboneArea, Site], description: Source provides a modeled connection between its target domains or sites.}
  REDISTRIBUTES: {from: [ASBR], to: [ExternalRoute], description: ASBR imports external reachability into OSPF.}
  RESTRICTS:
    from: [BackboneArea, NormalArea, StubArea, TotallyStubbyArea, NSSAArea, TotallyNSSAArea]
    to: [LSAType]
    description: Area type permits or denies propagation of an LSA category.
  APPLIED_ON: {from: [SummarizationPolicy], to: [ABR, ASBR], description: Boundary router applies summary policy.}
  ADVERTISED_BY: {from: [Prefix, PrefixSID, NodeSID, AdjacencySID], to: [LSA, RouterLSA, NetworkLSA, SummaryLSA, ExternalLSA, NSSALSA, OpaqueLSA, TLV, ISISTLV], description: Reachability or SID lineage points to its carrying protocol advertisement.}
  HAS_LSA_TYPE: {from: [LSA, RouterLSA, NetworkLSA, SummaryLSA, ExternalLSA, NSSALSA, OpaqueLSA], to: [LSAType], description: LSA instance has protocol type.}
  ORIGINATES_IN: {from: [Prefix], to: [OSPFArea], description: Prefix has an OSPF area of origin.}
  ATTACHED_TO: {from: [OSPFInterface], to: [BroadcastSegment], description: Interface participates in multiaccess segment.}
  HAS_NETWORK_TYPE: {from: [OSPFInterface], to: [OSPFNetworkType], description: Interface uses OSPF network behavior.}
  OSPF_ROLE_ON: {from: [DR, BDR], to: [OSPFRouter], description: Elected role is hosted by router.}
  HAS_OSPF_NEIGHBOR: {from: [OSPFProcess, OSPFRouter], to: [OSPFNeighbor], description: Process or router owns neighbor relationship.}
  CARRIED_BY_LSA: {from: [ExternalRoute], to: [ExternalLSA, NSSALSA], description: External route is represented by an external LSA.}
  SUMMARIZES: {from: [SummarizationPolicy], to: [Prefix], description: Policy aggregates or suppresses prefix detail.}
  GOVERNS: {from: [RedistributionPolicy], to: [ExternalRoute, BGPRoute], description: Redistribution policy governs route movement.}
  INJECTS_DEFAULT: {from: [DefaultRouteInjection], to: [OSPFArea], description: Policy injects default into area.}
  HAS_METRIC: {from: [OSPFInterface, Route, ExternalRoute], to: [OSPFMetric, Cost], description: Source has OSPF preference value.}
  COMPUTES: {from: [OSPFProcess], to: [SPFComputation], description: Process schedules and runs SPF.}
  PROVIDES_REACHABILITY: {from: [OSPFProcess], to: [InternalReachability], description: OSPF process provides internal reachability.}
  SUPPORTS_REACHABILITY: {from: [OSPFProcess], to: [BGPNextHopReachability, IGPReachability], description: OSPF supports recursive BGP next-hop reachability.}
  PROTECTS_WITH: {from: [Route, Reachability], to: [LFA, FastReroute], description: Reachability uses local alternate protection.}
  PROVIDES_REACHABILITY_TO: {from: [Reachability], to: [Prefix], description: Reachability state applies to prefix.}
  EXPOSES_ADJACENCY_RISK: {from: [OSPFNeighbor, BroadcastSegment], to: [OSPFAdjacencyRisk], description: Adjacency state exposes convergence or route-loss risk.}
  ORIGINATED_FROM: {from: [BGPRoute], to: [OSPFProcess, ExternalRoute, RedistributionPolicy], description: BGP route traces to OSPF redistribution lineage.}

