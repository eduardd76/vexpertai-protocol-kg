ontology:
  id: chapter-06-vpn
  title: VPN Protocol Module
  version: 2.0.0
  description: VPN service types, tunnel cryptography, MPLS segmentation, DMVPN dependencies, health, SLA, failover, and application impact.

node_labels:
  VPNService: Customer or enterprise virtual private network.
  SiteToSiteVPN: Encrypted connectivity between fixed sites.
  RemoteAccessVPN: User or endpoint remote-access service.
  DMVPN: Dynamic multipoint VPN overlay.
  GRE: Generic routing encapsulation tunnel component.
  NHRP: Next Hop Resolution Protocol dependency in DMVPN.
  IPsecTunnel: Encrypted tunnel security association and data path.
  IKEPolicy: IKE negotiation, authentication, and proposal policy.
  CryptoMap: Policy binding peers, transforms, and encryption domains.
  TunnelInterface: Logical tunnel attachment used by routing.
  VPNRouteTarget: Compatibility label for VPN route-target objects.
  Hub: Central VPN or DMVPN endpoint.
  Spoke: Remote VPN or DMVPN endpoint.
  OverlayTunnel: Logical tunnel carried across underlay transport.
  UnderlayTransport: Internet, MPLS, carrier Ethernet, or private routed transport.
  EncryptionDomain: Local and remote traffic selectors protected by IPsec.
  SplitTunnelPolicy: Remote-access policy selecting tunneled destinations.
  NATTraversal: UDP encapsulation behavior for IPsec across NAT.
  TunnelHealth: Summarized crypto and routed forwarding health.
  VPNSLA: Reachability or performance tracking objective.
  VPNFailoverPolicy: Policy changing tunnel or route preference after health failure.
  MPBGP: Multiprotocol BGP VPN route distribution.
  IKEState: Summarized IKE negotiation state.
  RoutingState: Summarized routed reachability across a tunnel.
  VPNRisk: VPN design or operational risk.
  AsymmetricRoutingRisk: Risk of forward and return paths using inconsistent VPN state.
  EncryptionDomainRisk: Risk caused by mismatched IPsec traffic selectors.

properties:
  VPNService:
    vpn_type: {type: string, required: true}
  IPsecTunnel:
    crypto_state: {type: string, required: true}
  IKEPolicy:
    version: {type: string, required: true}
  RouteTarget:
    value: {type: string, required: true}
  RouteDistinguisher:
    value: {type: string, required: true}
  TunnelHealth:
    status: {type: string, required: true}
  VPNSLA:
    status: {type: string, required: true}
  IKEState:
    state: {type: string, required: true}
  RoutingState:
    state: {type: string, required: true}
  VPNRisk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}

relationship_types:
  HAS_TUNNEL: {from: [VPNService, SiteToSiteVPN, RemoteAccessVPN, DMVPN], to: [IPsecTunnel, GRE, OverlayTunnel, TunnelInterface], description: VPN service is realized by tunnel component.}
  IMPORTS: {from: [VRF], to: [RouteTarget, VPNRouteTarget], description: VRF imports matching VPN routes.}
  EXPORTS: {from: [VRF], to: [RouteTarget, VPNRouteTarget], description: VRF exports matching VPN routes.}
  IMPORTED_BY: {from: [VPNRoute, VPNv4Route, VPNv6Route], to: [RouteTarget, VPNRouteTarget], description: VPN route is eligible for import through route target.}
  HAS_HEALTH: {from: [VPNService, IPsecTunnel, OverlayTunnel], to: [TunnelHealth], description: VPN object exposes summarized health.}
  HAS_STATE: {from: [IPsecTunnel, TunnelInterface], to: [IKEState, RoutingState], description: Tunnel exposes control and routed state.}
  HAS_ENCRYPTION_DOMAIN: {from: [CryptoMap, IPsecTunnel], to: [EncryptionDomain], description: Crypto policy or tunnel selects protected traffic.}
  USES_IKE_POLICY: {from: [CryptoMap], to: [IKEPolicy], description: Crypto map uses IKE negotiation policy.}
  USES_NAT_TRAVERSAL: {from: [IPsecTunnel], to: [NATTraversal], description: Tunnel uses NAT traversal encapsulation.}
  APPLIES_SPLIT_POLICY: {from: [RemoteAccessVPN], to: [SplitTunnelPolicy], description: Remote-access VPN applies split tunnel intent.}
  ATTACHED_BY: {from: [Site, VRF], to: [TunnelInterface, CustomerEdge, ProviderEdge], description: Site or VRF reaches VPN through attachment.}
  TRACKS: {from: [VPNFailoverPolicy], to: [VPNSLA, TunnelHealth], description: Failover policy tracks health objective.}
  HAS_FAILOVER_ROUTE: {from: [VPNFailoverPolicy], to: [VPNRoute], description: Policy can activate alternate VPN route.}
  SUPPORTS_STATE: {from: [Evidence], to: [IKEState, RoutingState, TunnelHealth, EncryptionDomain], description: Evidence supports a tunnel or routing state conclusion.}
  EXPOSES_VPN_RISK: {from: [VPNService, IPsecTunnel, MPLSL3VPN, DMVPN, EncryptionDomain], to: [VPNRisk, AsymmetricRoutingRisk, EncryptionDomainRisk], description: VPN object exposes modeled risk.}
  CONSUMES_VPN: {from: [BusinessService], to: [VPNService], description: Business service consumes VPN connectivity.}
  ENCRYPTED_BY: {from: [VPNService], to: [IKEPolicy], description: VPN service follows encryption negotiation policy.}

