dependency_rules:
  - id: vpn-service-site
    source: VPNService
    relationship: CONNECTS
    target: [Site]
    rationale: VPN service identifies the sites it connects.
  - id: vpn-underlay
    source: VPNService
    relationship: DEPENDS_ON
    target: [UnderlayTransport]
    rationale: Overlay availability depends on transport.
  - id: ipsec-ike-policy
    source: IPsecTunnel
    relationship: DEPENDS_ON
    target: [IKEPolicy]
    rationale: Tunnel establishment depends on compatible IKE negotiation.
  - id: ipsec-encryption-domain
    source: IPsecTunnel
    relationship: PROTECTS
    target: [EncryptionDomain]
    rationale: IPsec protects explicitly selected traffic.
  - id: dmvpn-components
    source: DMVPN
    relationship: USES
    target: [GRE, NHRP, IPsecTunnel]
    rationale: DMVPN reachability depends on encapsulation, resolution, and encryption.
  - id: mpls-l3vpn-components
    source: MPLSL3VPN
    relationship: USES
    target: [VRF, RouteDistinguisher, RouteTarget, MPBGP]
    rationale: L3VPN route separation and distribution require all components.
  - id: vpn-route-import
    source: VPNRoute
    relationship: IMPORTED_BY
    target: [RouteTarget]
    rationale: VPN route visibility follows route-target import policy.
  - id: tunnel-health-state
    source: TunnelHealth
    relationship: DEPENDS_ON
    target: [IKEState, RoutingState]
    rationale: Crypto-up alone does not prove routed forwarding.
  - id: application-vpn
    source: Application
    relationship: DEPENDS_ON
    target: [VPNService]
    rationale: Application impact traces to the VPN it consumes.
  - id: business-application
    source: BusinessService
    relationship: DEPENDS_ON
    target: [Application]
    rationale: Business impact traces through the application.
  - id: vpn-failover-protection
    source: VPNFailoverPolicy
    relationship: PROTECTS
    target: [VPNService]
    rationale: Failover policy protects service when health tracking works.

risk_rules:
  - id: crypto-up-routing-down
    applies_to: TunnelHealth
    when: IKE state is up and routing state is down
    severity: high
    response: Investigate routes, selectors, and tunnel interface before renegotiating IKE.
  - id: route-target-mismatch
    applies_to: RouteTarget
    when: export target has no intended matching VRF import
    severity: critical
    response: Correct import and export intent and validate tenant isolation.
  - id: broken-nhrp-dependency
    applies_to: DMVPN
    when: spoke registration or resolution is down
    severity: high
    response: Restore NHRP state before changing EIGRP or IPsec.
  - id: failed-vpn-sla
    applies_to: VPNSLA
    when: failover route exists but tracking status is failed
    severity: critical
    response: Repair tracking and validate policy activation.
  - id: encryption-domain-mismatch
    applies_to: EncryptionDomain
    when: local and remote selectors do not match required application flow
    severity: critical
    response: Correct selectors and validate bidirectional traffic.

validation_queries:
  - id: tunnel-crypto-up-routing-down
    description: Find tunnels with established IKE but missing routed forwarding.
    cypher: |
      MATCH (tunnel:IPsecTunnel)-[:HAS_STATE]->(ike:IKEState)
      MATCH (tunnel)-[:HAS_STATE]->(routing:RoutingState)
      WHERE ike.state = 'up' AND routing.state = 'down'
      RETURN tunnel.id, tunnel.name
  - id: vpn-route-target-no-import
    description: Find VPN routes whose route target is imported by no VRF.
    cypher: |
      MATCH (route:VPNRoute)-[:IMPORTED_BY]->(target:RouteTarget)
      WHERE NOT (:VRF)-[:IMPORTS]->(target)
      RETURN route.id, target.value
  - id: failed-sla-with-failover-route
    description: Find failover policy with route but failed tracking.
    cypher: |
      MATCH (policy:VPNFailoverPolicy)-[:TRACKS]->(sla:VPNSLA)
      MATCH (policy)-[:HAS_FAILOVER_ROUTE]->(route:VPNRoute)
      WHERE sla.status = 'failed'
      RETURN policy.id, route.id

example_scenarios:
  - id: crypto-up-routing-down
    summary: IPsec is established while routes across the tunnel are missing.
  - id: l3vpn-route-target-mismatch
    summary: Exported VPN route is not imported into the intended VRF.
  - id: dmvpn-nhrp-failure
    summary: Spoke-to-spoke reachability fails because NHRP state is broken.
  - id: failover-sla-failure
    summary: Alternate route exists but failed tracking prevents activation.
  - id: encryption-selector-mismatch
    summary: Application traffic is absent from the negotiated encryption domain.
