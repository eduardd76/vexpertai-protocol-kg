dependency_rules:
  - id: application-classification
    source: ApplicationTraffic
    relationship: CLASSIFIED_BY
    target: [ClassMap]
    rationale: Application treatment begins with explicit classification.
  - id: class-map-policy-owner
    source: ClassMap
    relationship: BELONGS_TO
    target: [QoSPolicy]
    rationale: Classification behavior traces to the owning policy.
  - id: policy-interface-attachment
    source: QoSPolicy
    relationship: APPLIED_TO
    target: [Interface]
    rationale: Correct policy definition has no effect until attached.
  - id: class-marking
    source: QoSClass
    relationship: MARKED_WITH
    target: [DSCP, CoS]
    rationale: Marking must be explicit and comparable to application intent.
  - id: queue-bandwidth-allocation
    source: QueuingPolicy
    relationship: ALLOCATES
    target: [BandwidthGuarantee]
    rationale: Scheduler behavior traces to bounded bandwidth allocation.
  - id: voice-priority-protection
    source: PriorityQueue
    relationship: PROTECTS
    target: [VoiceTraffic]
    rationale: Priority treatment protects delay-sensitive voice.
  - id: policer-drop-domain
    source: PolicingPolicy
    relationship: MAY_DROP
    target: [TrafficClass]
    rationale: Drop risk is explicit for classes exceeding the policer.
  - id: shaper-traffic-class
    source: ShapingPolicy
    relationship: SMOOTHS
    target: [TrafficClass]
    rationale: Shaping absorbs bursts before the constrained link.
  - id: sla-class-mapping
    source: SLARequirement
    relationship: MAPS_TO
    target: [QoSClass]
    rationale: Business performance intent maps to concrete treatment.
  - id: congestion-interface-queue
    source: CongestionEvent
    relationship: AFFECTS
    target: [InterfaceQueue]
    rationale: Congestion evidence resolves to the affected scheduler queue.
  - id: business-sla-requirement
    source: BusinessService
    relationship: DEPENDS_ON
    target: [SLARequirement]
    rationale: Business impact traces to measurable SLA requirements.

risk_rules:
  - id: defined-policy-not-applied
    applies_to: QoSPolicy
    when: required policy exists but is not attached to the WAN interface
    severity: critical
    response: Validate direction and attach the approved policy before changing markings.
  - id: critical-application-best-effort
    applies_to: ClassMap
    when: critical application maps to best-effort treatment
    severity: critical
    response: Correct classification and validate marking at ingress and egress.
  - id: priority-queue-starvation
    applies_to: PriorityQueue
    when: priority traffic is insufficiently policed and starves other classes
    severity: high
    response: Bound priority traffic and validate remaining class guarantees under load.
  - id: congestion-sla-breach
    applies_to: CongestionEvent
    when: queue congestion correlates with latency, jitter, or loss violation
    severity: critical
    response: Validate capacity, shaping, queue allocation, and offered load.
  - id: unnecessary-qos-complexity
    applies_to: QoSPolicy
    when: measured peak utilization has adequate headroom and no differentiated SLA
    severity: low
    response: Prefer capacity and operational simplicity unless a real congestion constraint exists.

validation_queries:
  - id: required-policy-not-applied
    description: Find interfaces that require a QoS policy but lack attachment.
    cypher: |
      MATCH (interface:Interface)-[:REQUIRES_QOS_POLICY]->(policy:QoSPolicy)
      WHERE NOT (policy)-[:APPLIED_TO]->(interface)
      RETURN interface.id, interface.name, policy.name
  - id: application-marking-mismatch
    description: Find application traffic whose required and actual markings differ.
    cypher: |
      MATCH (traffic:ApplicationTraffic)-[:REQUIRES_MARKING]->(expected:DSCP)
      MATCH (traffic)-[:CLASSIFIED_BY]->(:ClassMap)-[:CLASSIFIES_AS]->(class:QoSClass)
      MATCH (class)-[:MARKED_WITH]->(actual:DSCP)
      WHERE expected.value <> actual.value
      RETURN traffic.id, expected.value, actual.value
  - id: congestion-with-sla-violation
    description: Correlate congestion events with SLA violations and evidence.
    cypher: |
      MATCH (event:CongestionEvent)-[:CAUSES_SLA_VIOLATION]->(violation:SLAViolation)
            -[:VIOLATES_REQUIREMENT]->(requirement:SLARequirement)
      MATCH (evidence:Evidence)-[:SUPPORTS_QOS_STATE]->(event)
      RETURN event.id, requirement.id, violation.measured_value, evidence.name

example_scenarios:
  - id: voice-policy-not-attached
    summary: Voice is correctly classified and marked but policy is absent on the WAN interface.
  - id: critical-app-best-effort
    summary: Critical application receives best-effort classification and marking.
  - id: priority-queue-starvation
    summary: Unbounded priority traffic starves other scheduler classes.
  - id: congestion-sla-violation
    summary: WAN congestion correlates with measured SLA breach.
  - id: qos-not-required
    summary: High-capacity low-utilization link does not justify additional QoS complexity.
