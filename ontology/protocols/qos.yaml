ontology:
  id: chapter-10-qos
  title: QoS Protocol Module
  version: 2.0.0
  description: End-to-end classification, marking, policing, shaping, queuing, congestion evidence, SLA traceability, and bandwidth design necessity.

node_labels:
  QoSPolicy: End-to-end traffic treatment intent.
  ClassMap: Reusable traffic classification rule.
  PolicyMap: Ordered policy binding classes to actions.
  QoSClass: Policy class receiving marking and queue treatment.
  TrafficClass: Semantically grouped traffic behavior.
  DSCP: Layer 3 differentiated-services marking.
  CoS: Layer 2 class-of-service marking.
  MarkingPolicy: Policy assigning or preserving traffic markings.
  PolicingPolicy: Rate enforcement that may drop or remark excess traffic.
  ShapingPolicy: Rate adaptation that buffers traffic to a target rate.
  QueuingPolicy: Scheduling and bandwidth allocation policy.
  PriorityQueue: Strict or low-latency queue for delay-sensitive traffic.
  BandwidthGuarantee: Minimum scheduler bandwidth allocated to a class.
  WRED: Weighted random early detection congestion-avoidance policy.
  CongestionEvent: Time-bounded condition where offered load exceeds available service.
  InterfaceQueue: Interface scheduling and buffering resource.
  ApplicationTraffic: Application flow category requiring treatment.
  VoiceTraffic: Delay- and jitter-sensitive voice media.
  VideoTraffic: Delay-sensitive interactive or streaming video.
  CriticalDataTraffic: Business-critical data flow.
  BestEffortTraffic: Traffic receiving no strict performance guarantee.
  SLARequirement: Business-facing performance requirement.
  LatencyRequirement: Maximum acceptable end-to-end latency.
  JitterRequirement: Maximum acceptable delay variation.
  LossRequirement: Maximum acceptable packet loss.
  WANLink: Constrained or unconstrained WAN forwarding link.
  OversubscriptionRisk: Risk that offered traffic exceeds link or scheduler capacity.
  Queue: Compatibility label for a scheduling and buffering resource.
  SLAObjective: Compatibility label for measurable latency, loss, or jitter objective.
  CongestionPoint: Compatibility label for a location where demand can exceed capacity.
  SLAViolation: Observed SLA threshold breach.
  QoSDesignIntent: Expected classification, marking, queueing, or design-simplicity outcome.
  QoSDesignAssessment: Evidence-based assessment of whether QoS controls are necessary.
  QoSRisk: Risk caused by missing, incorrect, or excessive QoS treatment.

properties:
  QoSPolicy:
    status: {type: string, required: true}
  DSCP:
    value: {type: string, required: true}
  CoS:
    value: {type: integer, required: true}
  PolicingPolicy:
    rate_mbps: {type: integer, required: true}
  ShapingPolicy:
    rate_mbps: {type: integer, required: true}
  BandwidthGuarantee:
    percent: {type: integer, required: true}
  CongestionEvent:
    severity: {type: string, required: true}
  InterfaceQueue:
    utilization_percent: {type: integer, required: true}
  SLARequirement:
    metric: {type: string, required: true}
    threshold: {type: string, required: true}
  WANLink:
    capacity_mbps: {type: integer, required: true}
    peak_utilization_percent: {type: integer, required: true}
  OversubscriptionRisk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}
  SLAViolation:
    measured_value: {type: string, required: true}
  QoSRisk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}

relationship_types:
  CLASSIFIED_BY: {from: [Application, ApplicationTraffic, VoiceTraffic, VideoTraffic, CriticalDataTraffic, BestEffortTraffic], to: [ClassMap], description: Application traffic is matched by class map.}
  CLASSIFIES_AS: {from: [ClassMap], to: [QoSClass, TrafficClass], description: Class map assigns matched traffic to policy class.}
  APPLIED_TO: {from: [QoSPolicy, PolicyMap, MarkingPolicy, PolicingPolicy, ShapingPolicy, QueuingPolicy], to: [Interface, WANLink], description: QoS policy is attached to an enforcement interface or link.}
  MARKED_WITH: {from: [QoSClass, TrafficClass], to: [DSCP, CoS], description: Traffic class uses explicit Layer 3 or Layer 2 marking.}
  REQUIRES_MARKING: {from: [ApplicationTraffic, VoiceTraffic, VideoTraffic, CriticalDataTraffic], to: [DSCP, CoS], description: Application traffic requires expected marking.}
  MAY_DROP: {from: [PolicingPolicy], to: [TrafficClass, QoSClass, VoiceTraffic, VideoTraffic, CriticalDataTraffic, BestEffortTraffic], description: Policier can drop excess traffic from class.}
  SMOOTHS: {from: [ShapingPolicy], to: [TrafficClass, QoSClass, VoiceTraffic, VideoTraffic, CriticalDataTraffic, BestEffortTraffic], description: Shaper buffers class traffic to target rate.}
  MAPS_TO: {from: [ClassMap, SLARequirement, LatencyRequirement, JitterRequirement, LossRequirement], to: [QoSClass, TrafficClass], description: Classification or SLA requirement maps to traffic class.}
  IMPACTED_BY: {from: [BusinessService], to: [CongestionEvent], description: Business service is impacted by congestion.}
  REQUIRES_QOS_POLICY: {from: [Interface, WANLink], to: [QoSPolicy], description: Interface or link requires a policy to meet service intent.}
  HAS_CLASS_MAP: {from: [QoSPolicy, PolicyMap], to: [ClassMap], description: Policy contains classification rule.}
  HAS_POLICY_MAP: {from: [QoSPolicy], to: [PolicyMap], description: End-to-end policy is implemented by policy map.}
  HAS_MARKING_POLICY: {from: [QoSPolicy, PolicyMap], to: [MarkingPolicy], description: Policy uses marking action.}
  HAS_POLICING_POLICY: {from: [QoSPolicy, PolicyMap, PriorityQueue], to: [PolicingPolicy], description: Policy or queue uses policer.}
  HAS_SHAPING_POLICY: {from: [QoSPolicy, PolicyMap], to: [ShapingPolicy], description: Policy uses shaping action.}
  HAS_QUEUING_POLICY: {from: [QoSPolicy, PolicyMap], to: [QueuingPolicy], description: Policy uses queue scheduler.}
  USES_QUEUE: {from: [QueuingPolicy, QoSClass, TrafficClass], to: [InterfaceQueue, Queue, PriorityQueue], description: Scheduler or class uses queue resource.}
  USES_WRED: {from: [QueuingPolicy, InterfaceQueue, Queue], to: [WRED], description: Queue uses early-drop congestion avoidance.}
  HAS_QUEUE: {from: [Interface, WANLink], to: [InterfaceQueue, Queue, PriorityQueue], description: Interface or link owns queue resource.}
  CAUSES_SLA_VIOLATION: {from: [CongestionEvent], to: [SLAViolation], description: Congestion correlates with observed SLA breach.}
  DROPS_TRAFFIC: {from: [CongestionEvent, InterfaceQueue], to: [TrafficClass, QoSClass, VoiceTraffic, VideoTraffic, CriticalDataTraffic, BestEffortTraffic], description: Congestion or queue state records dropped traffic class.}
  VIOLATES_REQUIREMENT: {from: [SLAViolation], to: [SLARequirement, LatencyRequirement, JitterRequirement, LossRequirement], description: Observation exceeds requirement threshold.}
  SUPPORTS_QOS_STATE: {from: [Evidence], to: [CongestionEvent, InterfaceQueue, SLAViolation, QoSDesignAssessment], description: Evidence supports QoS state or design conclusion.}
  VIOLATES_QOS_INTENT: {from: [QoSPolicy, ClassMap, PolicingPolicy, QueuingPolicy], to: [QoSDesignIntent], description: Implemented or proposed treatment conflicts with design intent.}
  EVALUATES_LINK: {from: [QoSDesignAssessment], to: [WANLink], description: Assessment evaluates measured capacity and utilization.}
  EXPOSES_QOS_RISK: {from: [QoSPolicy, ClassMap, PolicingPolicy, QueuingPolicy, WANLink, CongestionEvent], to: [QoSRisk, OversubscriptionRisk], description: QoS state or design exposes performance risk.}
  CLASSIFIES: {from: [QoSPolicy], to: [TrafficClass, QoSClass], description: Compatibility relationship from policy to class.}
  MAPS_TO_QUEUE: {from: [TrafficClass, QoSClass], to: [Queue, InterfaceQueue, PriorityQueue], description: Compatibility relationship from class to queue treatment.}
  APPLIED_AT: {from: [QoSPolicy], to: [Interface, WANLink, CongestionPoint], description: Compatibility relationship for enforcement location.}
  MEASURED_BY: {from: [SLAObjective, SLARequirement], to: [ValidationCheck], description: Validation check measures performance objective.}

