  - {label: EIGRPASN, property: id, type: unique}
  - {label: EIGRPNamedMode, property: id, type: unique}
  - {label: EIGRPNeighbor, property: id, type: unique}
  - {label: EIGRPInterface, property: id, type: unique}
  - {label: EIGRPTopologyTable, property: id, type: unique}
  - {label: SuccessorRoute, property: id, type: unique}
  - {label: FeasibleSuccessorRoute, property: id, type: unique}
  - {label: FeasibilityCondition, property: id, type: unique}
  - {label: QueryDomain, property: id, type: unique}
  - {label: StubRouter, property: id, type: unique}
  - {label: SummaryRoute, property: id, type: unique}
  - {label: SpecificPrefix, property: id, type: unique}
  - {label: Variance, property: id, type: unique}
  - {label: UnequalCostLoadBalancing, property: id, type: unique}
  - {label: PassiveInterface, property: id, type: unique}
  - {label: EIGRPMetric, property: id, type: unique}
  - {label: Delay, property: id, type: unique}
  - {label: Bandwidth, property: id, type: unique}
  - {label: Reliability, property: id, type: unique}
  - {label: Load, property: id, type: unique}
  - {label: MTU, property: id, type: unique}
  - {label: RedistributionPolicy, property: id, type: unique}
  - {label: HubAndSpokeTopology, property: id, type: unique}
