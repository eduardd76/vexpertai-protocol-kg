dependency_rules:
  - id: eigrp-process-device
    source: EIGRPProcess
    relationship: RUNS_ON
    target: [Device, EIGRPRouter]
    rationale: Process identity resolves to its hosting router.
  - id: eigrp-neighbor-interface
    source: EIGRPNeighbor
    relationship: FORMED_OVER
    target: [Interface, EIGRPInterface]
    rationale: Neighbor state traces to the participating interface.
  - id: eigrp-prefix-process
    source: Prefix
    relationship: LEARNED_BY
    target: [EIGRPProcess]
    rationale: Prefix lineage identifies its EIGRP process.
  - id: eigrp-successor-metric
    source: SuccessorRoute
    relationship: SELECTED_BY
    target: [EIGRPMetric]
    rationale: Forwarding choice traces to its composite metric.
  - id: eigrp-feasible-successor-protection
    source: FeasibleSuccessorRoute
    relationship: PROTECTS
    target: [Prefix]
    rationale: Loop-free backup protects prefix convergence.
  - id: eigrp-stub-query-scope
    source: StubRouter
    relationship: REDUCES
    target: [QueryDomain]
    rationale: Stub behavior limits active query propagation.
  - id: eigrp-summary-specific
    source: SummaryRoute
    relationship: HIDES
    target: [SpecificPrefix]
    rationale: Aggregate discard behavior can hide required more specifics.
  - id: eigrp-variance-load-balancing
    source: Variance
    relationship: ENABLES
    target: [UnequalCostLoadBalancing]
    rationale: Unequal-cost forwarding requires explicit variance.
  - id: eigrp-redistribution-route-map
    source: RedistributionPolicy
    relationship: CONTROLLED_BY
    target: [RouteMap]
    rationale: EIGRP route movement is governed by explicit policy.
  - id: eigrp-hub-reachability
    source: HubSpokeReachability
    relationship: DEPENDS_ON
    target: [HubRouter]
    rationale: Spoke-to-spoke reachability exposes its central hub dependency.
  - id: dmvpn-eigrp-dependency
    source: DMVPNOverlay
    relationship: MAY_DEPEND_ON
    target: [EIGRPProcess, HubSpokeReachability]
    rationale: DMVPN tunnels may depend on EIGRP reachability and hub behavior.

risk_rules:
  - id: no-feasible-successor
    applies_to: SuccessorRoute
    when: important prefix has no feasible successor
    severity: high
    response: Validate convergence time and query-domain scope after successor loss.
  - id: summary-blackhole
    applies_to: SummaryRoute
    when: discard summary remains while required more-specific route is absent
    severity: critical
    response: Correct summary scope or restore the specific route.
  - id: unbounded-query-domain
    applies_to: QueryDomain
    when: hub-and-spoke spokes are not configured as stubs
    severity: high
    response: Apply stub policy and validate query propagation.
  - id: eigrp-bgp-feedback
    applies_to: RedistributionPolicy
    when: bidirectional redistribution lacks tagging and origin filtering
    severity: critical
    response: Add route tags, deny feedback, and validate rollback.

validation_queries:
  - id: prefixes-without-feasible-successor
    description: Find learned prefixes with no feasible successor protection.
    cypher: |
      MATCH (prefix:Prefix)-[:LEARNED_BY]->(:EIGRPProcess)
      WHERE NOT (:FeasibleSuccessorRoute)-[:PROTECTS]->(prefix)
      RETURN prefix.id, prefix.cidr
  - id: summary-hidden-required-prefix
    description: Find summaries hiding a required missing more-specific.
    cypher: |
      MATCH (summary:SummaryRoute)-[:HIDES]->(prefix:SpecificPrefix)
      WHERE prefix.required = true AND prefix.visibility = 'missing'
      RETURN summary.id, prefix.cidr
  - id: redistribution-feedback-risk
    description: Find redistribution policies exposing an unmitigated feedback risk.
    cypher: |
      MATCH (policy:RedistributionPolicy)-[:EXPOSES_FEEDBACK_RISK]->(risk:Risk)
      WHERE NOT (risk)-[:MITIGATED_BY]->()
      RETURN policy.id, risk.name

example_scenarios:
  - id: missing-feasible-successor
    summary: Prefix convergence requires a query because no feasible successor exists.
  - id: stub-query-containment
    summary: Stub spokes reduce query propagation in a hub-and-spoke topology.
  - id: bad-summary
    summary: Summary discard route blackholes a missing more-specific prefix.
  - id: variance-unequal-cost
    summary: Variance installs a feasible path with a higher metric.
  - id: eigrp-bgp-feedback
    summary: Bidirectional redistribution without tagging exposes route feedback.
