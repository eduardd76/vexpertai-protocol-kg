ontology:
  id: chapter-05-eigrp
  title: EIGRP Design
  version: 2.0.0
  description: EIGRP topology decisions, composite metrics, query scope, summarization, unequal-cost forwarding, hub dependencies, and redistribution.

node_labels:
  EIGRPProcess: EIGRP routing instance.
  EIGRPASN: EIGRP autonomous-system identifier.
  EIGRPNamedMode: Named configuration and address-family scope.
  EIGRPNeighbor: Summarized EIGRP adjacency state.
  EIGRPInterface: Interface participating in EIGRP.
  EIGRPTopologyTable: Feasible-distance and route-candidate state.
  SuccessorRoute: Best loop-free route selected for forwarding.
  FeasibleSuccessorRoute: Loop-free backup satisfying the feasibility condition.
  FeasibilityCondition: Reported distance must be lower than successor feasible distance.
  QueryDomain: Routers that may receive a query for lost reachability.
  StubRouter: Router limiting routes advertised and queries propagated.
  SummaryRoute: Aggregate route with an associated discard behavior.
  SpecificPrefix: More-specific prefix covered by a summary.
  Variance: Multiplier admitting additional feasible paths.
  UnequalCostLoadBalancing: Forwarding across feasible paths with different metrics.
  PassiveInterface: Interface advertising a network without forming neighbors.
  EIGRPMetric: Composite path metric used for route selection.
  Delay: Cumulative interface delay metric component.
  Bandwidth: Minimum path bandwidth metric component.
  Reliability: Optional reliability metric component.
  Load: Optional load metric component.
  MTU: Path MTU metadata carried but not used in classic metric selection.
  HubAndSpokeTopology: Topology with central reachability dependency.
  DMVPNDependency: Dependency between DMVPN control/overlay and routed reachability.
  EIGRPRouter: Router participating in an EIGRP process.
  HubRouter: Central router required for spoke reachability.
  HubSpokeReachability: Summarized reachability through a hub.
  DMVPNOverlay: DMVPN tunnel and NHRP overlay.

properties:
  EIGRPProcess:
    autonomous_system: {type: integer, required: true}
  EIGRPASN:
    asn: {type: integer, required: true}
  EIGRPNeighbor:
    state: {type: string, required: true}
    peer_address: {type: string, required: true}
  EIGRPInterface:
    state: {type: string, required: true}
  SuccessorRoute:
    feasible_distance: {type: integer, required: true}
  FeasibleSuccessorRoute:
    reported_distance: {type: integer, required: true}
  Variance:
    multiplier: {type: integer, required: true}
  EIGRPMetric:
    value: {type: integer, required: true}
  Delay:
    value: {type: integer, required: true}
  Bandwidth:
    value: {type: integer, required: true}
  Reliability:
    value: {type: integer, required: true}
  Load:
    value: {type: integer, required: true}
  MTU:
    value: {type: integer, required: true}

relationship_types:
  HAS_ASN: {from: [EIGRPProcess], to: [EIGRPASN], description: Process uses autonomous-system identity.}
  USES_NAMED_MODE: {from: [EIGRPProcess], to: [EIGRPNamedMode], description: Process uses named address-family configuration.}
  HAS_EIGRP_NEIGHBOR: {from: [EIGRPProcess, EIGRPRouter], to: [EIGRPNeighbor], description: Process or router owns neighbor state.}
  HAS_TOPOLOGY_TABLE: {from: [EIGRPProcess], to: [EIGRPTopologyTable], description: Process owns topology candidates.}
  HAS_ROUTE: {from: [EIGRPTopologyTable], to: [SuccessorRoute, FeasibleSuccessorRoute, SummaryRoute], description: Topology table contains candidate or summary route.}
  LEARNED_BY: {from: [Prefix], to: [EIGRPProcess], description: Prefix is learned through EIGRP process.}
  SELECTED_BY: {from: [SuccessorRoute, BGPRoute], to: [EIGRPMetric, BGPBestPathDecision], description: Route selection traces to its metric or best-path decision.}
  SATISFIES_FEASIBILITY: {from: [FeasibleSuccessorRoute], to: [FeasibilityCondition], description: Backup path meets loop-free feasibility test.}
  REDUCES: {from: [StubRouter], to: [QueryDomain], description: Stub behavior limits query propagation.}
  HIDES: {from: [SummaryRoute], to: [SpecificPrefix], description: Summary can suppress or blackhole more-specific reachability.}
  ENABLES: {from: [Variance], to: [UnequalCostLoadBalancing], description: Variance admits feasible unequal-cost paths.}
  HAS_METRIC_COMPONENT: {from: [EIGRPMetric], to: [Delay, Bandwidth, Reliability, Load, MTU], description: Composite metric references summarized components.}
  PART_OF_QUERY_DOMAIN: {from: [EIGRPRouter, HubRouter, StubRouter], to: [QueryDomain], description: Router participates in active query scope.}
  HAS_STUB_ROUTER: {from: [HubAndSpokeTopology], to: [StubRouter], description: Hub-and-spoke topology uses stub spokes.}
  MAY_DEPEND_ON: {from: [DMVPNOverlay], to: [EIGRPProcess, HubSpokeReachability], description: DMVPN overlay may require EIGRP reachability for tunnels and spokes.}
  HAS_DMVPN_DEPENDENCY: {from: [HubAndSpokeTopology], to: [DMVPNDependency], description: Topology records DMVPN routing dependency.}
  EXPOSES_FEEDBACK_RISK: {from: [RedistributionPolicy], to: [Risk], description: Redistribution policy exposes feedback or loop risk.}
  USES_VARIANCE: {from: [EIGRPProcess], to: [Variance], description: Process applies variance to feasible routes.}
  HAS_PASSIVE_INTERFACE: {from: [EIGRPProcess], to: [PassiveInterface], description: Process suppresses neighbor formation on interface.}

