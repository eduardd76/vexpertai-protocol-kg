dependency_rules:
  - id: option-requirement-traceability
    source: DesignOption
    relationship: SATISFIES
    target: [Requirement, BusinessRequirement, TechnicalRequirement]
    rationale: Options must show which stated needs they satisfy.
  - id: option-constraint-conflict
    source: DesignOption
    relationship: VIOLATES
    target: [Constraint, CostConstraint, SkillConstraint, HardwareConstraint]
    rationale: Constraint conflicts must be visible before selection.
  - id: decision-option-selection
    source: DesignDecision
    relationship: CHOOSES
    target: [DesignOption]
    rationale: An approved decision identifies exactly what was selected.
  - id: decision-risk-acceptance
    source: DesignDecision
    relationship: CREATES_RISK
    target: [Risk]
    rationale: Accepted risk must trace to the responsible decision.
  - id: migration-ordering
    source: MigrationStep
    relationship: DEPENDS_ON
    target: [MigrationStep]
    rationale: Step ordering must expose unsafe or unvalidated prerequisites.
  - id: technology-addition-protocol-impact
    source: TechnologyAddition
    relationship: IMPACTS
    target: [ExistingProtocol]
    rationale: New features can change existing protocol behavior and operations.
  - id: replacement-coexistence
    source: TechnologyReplacement
    relationship: REQUIRES
    target: [CoexistencePlan]
    rationale: Brownfield replacement requires an explicit coexistence period.
  - id: merger-routing-integration
    source: MergerDesign
    relationship: REQUIRES
    target: [RoutingIntegrationPlan]
    rationale: Merger reachability exchange requires explicit policy and ownership.
  - id: option-tradeoff
    source: DesignOption
    relationship: HAS_TRADEOFF
    target: [Tradeoff]
    rationale: Benefits and costs must be visible together.
  - id: risk-control
    source: Risk
    relationship: MITIGATED_BY
    target: [Control]
    rationale: Material risk needs a named, testable control.
  - id: requirement-criticality
    source: Requirement
    relationship: PRIORITIZED_BY
    target: [BusinessCriticality]
    rationale: Requirement priority must trace to business impact.
  - id: monitoring-feature-coverage
    source: MonitoringRequirement
    relationship: COVERS
    target: [ProtocolFeature]
    rationale: Added protocol behavior requires explicit observable signals.

risk_rules:
  - id: selected-option-violates-constraint
    applies_to: DesignOption
    when: option is chosen and has a VIOLATES relationship
    severity: high
    response: Reject selection or obtain explicit constraint exception.
  - id: unvalidated-assumption
    applies_to: Assumption
    when: status is unvalidated and no VALIDATED_BY relationship exists
    severity: high
    response: Validate the assumption or add contingency before approval.
  - id: unsafe-migration-dependency
    applies_to: MigrationStep
    when: prerequisite is not validated or the dependent step has no rollback plan
    severity: critical
    response: Block execution until prerequisite and rollback checks pass.
  - id: unmitigated-design-risk
    applies_to: Risk
    when: severity is high or critical and no MITIGATED_BY relationship exists
    severity: high
    response: Assign an effective control or formally accept the residual risk.

validation_queries:
  - id: unvalidated-assumptions
    description: Find assumptions without a completed validation.
    cypher: |
      MATCH (assumption:Assumption)
      WHERE assumption.status <> 'validated'
        AND NOT (assumption)-[:VALIDATED_BY]->()
      RETURN assumption.id, assumption.name, assumption.owner
  - id: unsafe-migration-steps
    description: Find steps with an incomplete prerequisite or no rollback.
    cypher: |
      MATCH (step:MigrationStep)-[:DEPENDS_ON]->(prerequisite:MigrationStep)
      WHERE prerequisite.status <> 'validated'
         OR NOT (step)-[:HAS_ROLLBACK]->(:RollbackPlan)
      RETURN step.id, prerequisite.id
  - id: unmitigated-risks
    description: Find design risks without controls.
    cypher: |
      MATCH (risk:Risk)
      WHERE NOT (risk)-[:MITIGATED_BY]->()
      RETURN risk.id, risk.name, risk.severity

example_scenarios:
  - id: merger-routing-options
    summary: Compare separate routing islands with controlled redistribution during a company merger.
  - id: protocol-replacement-coexistence
    summary: Replace an existing IGP through ordered coexistence and rollback-safe migration.
  - id: scalability-versus-simplicity
    summary: Compare hierarchical scale with operational skill and complexity constraints.
  - id: convergence-versus-complexity
    summary: Add fast failure detection while exposing monitoring and operational burden.
