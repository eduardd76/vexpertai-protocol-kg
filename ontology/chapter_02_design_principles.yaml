ontology:
  id: chapter-02-design-principles
  title: Network Design Tools and Best Practices
  version: 2.0.0
  description: Requirement traceability, option analysis, risk, migration safety, technology change, monitoring, and organizational network change.

node_labels:
  DesignRequirement: Requirement directly governing network design.
  BusinessRequirement: Business outcome or continuity need.
  TechnicalRequirement: Required technical behavior or capability.
  Assumption: Belief requiring evidence or validation.
  MigrationPlan: Ordered transition from current to target state.
  MigrationStep: Atomic migration action with prerequisites and outcome.
  RollbackPlan: Tested path back to a known-safe state.
  HighAvailabilityRequirement: Availability and failure-recovery need.
  ScalabilityRequirement: Growth and control-plane scale need.
  ConvergenceRequirement: Maximum acceptable recovery behavior.
  SecurityRequirement: Required confidentiality, integrity, or policy behavior.
  OperationalRequirement: Operability, supportability, and simplicity need.
  MonitoringRequirement: Required observability for a protocol or feature.
  CostConstraint: Budget or recurring cost boundary.
  SkillConstraint: Available engineering skill boundary.
  HardwareConstraint: Platform capability or lifecycle boundary.
  TechnologyReplacement: Planned removal of an existing technology.
  TechnologyAddition: Introduction of a new protocol or feature.
  MergerDesign: Integration design for independently operated networks.
  DivestmentDesign: Separation design preserving required service continuity.
  BrownfieldNetwork: Existing network with inherited state and constraints.
  GreenfieldNetwork: New network without inherited production dependencies.
  ExistingProtocol: Protocol already carrying production reachability.
  CoexistencePlan: Controlled period where old and new technologies operate together.
  RoutingIntegrationPlan: Policy for exchanging reachability between routing domains.
  Control: Risk-reduction mechanism with an owner and test.
  BusinessCriticality: Business priority used to rank requirements.
  ProtocolFeature: Protocol behavior requiring design and monitoring.
  OperationalComplexity: Summarized burden on people, tooling, and troubleshooting.
  AvailabilityTarget: Allowed service disruption objective.
  ConvergenceTarget: Maximum acceptable control-plane recovery interval.
  OperabilityConstraint: Human or tooling boundary affecting design.
  CapacityModel: Summarized demand and headroom model.

properties:
  Requirement:
    priority: {type: string, required: true}
    acceptance_criteria: {type: string, required: true}
  Assumption:
    status: {type: string, required: true}
    owner: {type: string, required: true}
  Risk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}
    state: {type: string, required: true}
  DesignOption:
    status: {type: string, required: true}
  DesignDecision:
    rationale: {type: string, required: true}
    status: {type: string, required: true}
  MigrationStep:
    sequence: {type: integer, required: true}
    status: {type: string, required: true}
  RollbackPlan:
    tested: {type: boolean, required: true}
  MonitoringRequirement:
    signal: {type: string, required: true}
  BusinessCriticality:
    rank: {type: integer, required: true}
  OperationalComplexity:
    score: {type: integer, required: true}
  AvailabilityTarget:
    objective: {type: string, required: true}
  CapacityModel:
    headroom_percent: {type: integer, required: true}

relationship_types:
  DERIVED_FROM: {from: [DesignObjective, DesignConstraint, DesignRequirement], to: [Requirement, BusinessRequirement, TechnicalRequirement], description: Design statement traces to a stakeholder need.}
  BALANCES: {from: [DesignDecision, DesignOption], to: [AvailabilityTarget, ConvergenceTarget, OperabilityConstraint, CapacityModel, ScalabilityRequirement, OperationalRequirement], description: Decision or option reconciles competing outcomes.}
  SATISFIES:
    from: [DesignDecision, DesignOption, ValidationCheck]
    to: [Requirement, DesignRequirement, BusinessRequirement, TechnicalRequirement, HighAvailabilityRequirement, ScalabilityRequirement, ConvergenceRequirement, SecurityRequirement, OperationalRequirement, MonitoringRequirement, DesignObjective]
    description: Source fulfills a stated requirement or objective.
  VIOLATES: {from: [DesignOption], to: [Constraint, CostConstraint, SkillConstraint, HardwareConstraint], description: Option conflicts with a binding constraint.}
  CHOOSES: {from: [DesignDecision], to: [DesignOption], description: Decision selects the approved option.}
  CREATES_RISK: {from: [DesignDecision], to: [Risk], description: Decision creates or accepts a modeled risk.}
  HAS_RISK: {from: [DesignOption, MigrationStep, TechnologyAddition, TechnologyReplacement], to: [Risk], description: Candidate or change exposes a modeled risk.}
  REQUIRES:
    from: [TechnologyReplacement, MergerDesign, BGPFreeCore]
    to: [CoexistencePlan, RoutingIntegrationPlan, EdgeToEdgeReachability]
    description: Change design cannot proceed safely without the target plan.
  PRIORITIZED_BY: {from: [Requirement, DesignRequirement, BusinessRequirement, TechnicalRequirement, HighAvailabilityRequirement, ScalabilityRequirement, ConvergenceRequirement, SecurityRequirement, OperationalRequirement, MonitoringRequirement], to: [BusinessCriticality], description: Business impact determines requirement priority.}
  COVERS: {from: [MonitoringRequirement], to: [ProtocolFeature], description: Monitoring requirement observes feature state and behavior.}
  HAS_FEATURE: {from: [ExistingProtocol], to: [ProtocolFeature], description: Existing protocol exposes a feature requiring design attention.}
  INCREASES: {from: [TechnologyAddition, DesignOption], to: [OperationalComplexity], description: Change or option increases operational burden.}
  BASED_ON_ASSUMPTION: {from: [DesignOption, DesignDecision, MigrationPlan], to: [Assumption], description: Source reasoning depends on assumption.}
  HAS_STEP: {from: [MigrationPlan], to: [MigrationStep], description: Migration plan contains ordered step.}
  HAS_ROLLBACK: {from: [MigrationPlan, MigrationStep], to: [RollbackPlan], description: Plan or step has a safe reversal path.}
  INTEGRATES: {from: [RoutingIntegrationPlan], to: [ExistingProtocol], description: Plan controls reachability exchange with protocol.}
  REPLACES: {from: [TechnologyReplacement], to: [ExistingProtocol], description: Change retires existing protocol or technology.}
  ADDS_FEATURE: {from: [TechnologyAddition], to: [ProtocolFeature], description: Addition introduces protocol capability.}
  APPLIES_TO_NETWORK: {from: [MigrationPlan, TechnologyReplacement, TechnologyAddition, MergerDesign, DivestmentDesign], to: [BrownfieldNetwork, GreenfieldNetwork], description: Design or change applies to network context.}

