ontology:
  id: chapter-08-bgp
  title: Border Gateway Protocol Design
  version: 2.0.0
  description: BGP sessions, updates, path attributes, policy, reflection, next-hop recursion, exit selection, edge design, and convergence protection.

node_labels:
  AutonomousSystem: BGP administrative routing domain.
  IBGPSession: BGP session within an autonomous system.
  EBGPSession: BGP session between autonomous systems.
  RouteReflector: iBGP route-reflection function.
  RouteReflectorClient: BGP client receiving reflected routes.
  RouteReflectorCluster: iBGP reflection and cluster-ID scope.
  Confederation: Collection of private member ASNs presented as one external ASN.
  BGPUpdate: BGP message carrying reachable or withdrawn NLRI and attributes.
  NLRI: Network-layer reachability information.
  PathAttribute: Attribute participating in policy or best-path selection.
  ASPath: Ordered autonomous-system path.
  LocalPreference: Intra-AS exit preference.
  MED: Inter-AS entry suggestion.
  NextHop: Forwarding recursion target carried by BGP.
  BGPNextHop: BGP next-hop object requiring recursive reachability.
  ExtendedCommunity: Extended BGP policy attribute including VPN semantics.
  LargeCommunity: Three-part BGP policy attribute.
  RoutePolicy: Ordered import, export, or path-manipulation policy.
  ASPathList: AS-path matching policy object.
  CommunityList: Community matching policy object.
  BGPBestPathDecision: Ordered evaluation resulting in selected BGP path.
  AddPath: Capability advertising multiple paths for the same NLRI.
  BGPFreeCore: Design where core routers carry transport but not service BGP.
  BGPPIC: Precomputed alternate BGP next-hop protection.
  BGPBestExternal: Advertisement of best external path alongside internal best.
  HotPotatoRouting: Selection of nearest acceptable exit.
  ColdPotatoRouting: Policy retaining traffic to a preferred distant exit.
  PeeringPolicy: Commercial and technical policy for a BGP peer.
  TransitProvider: External AS providing transit.
  CustomerRoute: Customer-originated BGP reachability.
  BlackholeRoute: BGP route intentionally directed to discard.
  BGPAddressFamily: BGP network-layer reachability family.
  BGPPolicy: Compatibility label for BGP policy intent.
  BGPPathPolicy: Ordered attribute manipulation and selection intent.
  NextHopFailure: Failure of selected recursive next hop.
  IGPMetricToExit: IGP distance controlling nearest-exit selection.
  PolicyPreference: Explicit policy controlling distant-exit selection.
  EdgeToEdgeReachability: Transport reachability between BGP edge nodes.
  ServiceReachability: Summarized service path through a selected BGP route.
  SelectedBGPPath: Selected path and exit used for forwarding.
  BGPPathRisk: Risk caused by policy, reflection, recursion, or blackholing.

properties:
  BGPProcess:
    asn: {type: integer, required: true}
    router_id: {type: string, required: true}
  AutonomousSystem:
    asn: {type: integer, required: true}
  BGPNeighbor:
    session_state: {type: string, required: true}
    peer_address: {type: string, required: true}
  BGPUpdate:
    action: {type: string, required: true}
  ASPath:
    value: {type: string, required: true}
  LocalPreference:
    value: {type: integer, required: true}
  MED:
    value: {type: integer, required: true}
  NextHop:
    address: {type: string, required: true}
  Community:
    value: {type: string, required: true}
  BGPBestPathDecision:
    reason: {type: string, required: true}
  BGPPathRisk:
    severity: {type: string, required: true}
    likelihood: {type: string, required: true}

relationship_types:
  ADVERTISED_TO: {from: [BGPRoute], to: [BGPNeighbor, RouteReflectorClient], description: BGP route is advertised to peer or client.}
  FILTERS: {from: [RoutePolicy, MulticastBoundary], to: [BGPRoute, MulticastGroup], description: Policy or boundary permits, denies, or scopes a route or group.}
  MODIFIES_ROUTE: {from: [RoutePolicy], to: [BGPRoute], description: Policy changes route attributes.}
  MATCHES: {from: [PrefixList], to: [Prefix], description: Prefix list matches route prefix.}
  INFLUENCES: {from: [Community, ExtendedCommunity, LargeCommunity], to: [RoutePolicy], description: Community value drives policy behavior.}
  REFLECTS: {from: [RouteReflector], to: [BGPRoute], description: Route reflector reflects route rather than requiring full mesh.}
  REFLECTED_TO: {from: [BGPRoute], to: [RouteReflectorClient], description: Reflected route is sent to client.}
  HAS_NEXT_HOP: {from: [BGPRoute, SelectedBGPPath], to: [NextHop, BGPNextHop], description: Route or selected path uses recursive next hop.}
  HAS_ATTRIBUTE: {from: [BGPRoute, BGPUpdate], to: [PathAttribute, ASPath, LocalPreference, MED, NextHop, Community, ExtendedCommunity, LargeCommunity], description: Route or update carries path attribute.}
  CARRIES_NLRI: {from: [BGPUpdate], to: [NLRI], description: Update carries reachable or withdrawn NLRI.}
  REPRESENTS_NLRI: {from: [BGPRoute], to: [NLRI, Prefix], description: Route represents network-layer reachability.}
  HAS_SESSION: {from: [BGPProcess], to: [IBGPSession, EBGPSession], description: Process owns BGP session.}
  SESSION_WITH: {from: [IBGPSession, EBGPSession], to: [BGPNeighbor], description: Session terminates on neighbor.}
  BELONGS_TO_AS: {from: [BGPProcess], to: [AutonomousSystem, Confederation], description: Process belongs to routing administration.}
  ACTIVATES: {from: [BGPProcess], to: [BGPAddressFamily], description: Process enables address family.}
  APPLIES_BGP_POLICY: {from: [BGPProcess, BGPNeighbor, IBGPSession, EBGPSession], to: [BGPPolicy, BGPPathPolicy, RoutePolicy, PeeringPolicy], description: BGP object applies policy.}
  HAS_CLIENT: {from: [RouteReflector, RouteReflectorCluster], to: [RouteReflectorClient], description: Reflection domain has client.}
  MEMBER_OF_RR_CLUSTER: {from: [RouteReflector], to: [RouteReflectorCluster], description: Reflector belongs to cluster.}
  USES_ROUTE: {from: [SelectedBGPPath, ServiceReachability], to: [BGPRoute], description: Selected path or service reachability uses route.}
  USES_EXIT: {from: [HotPotatoRouting, ColdPotatoRouting, SelectedBGPPath], to: [InternetEdge], description: Routing behavior selects internet edge.}
  PROVIDES_TRANSIT: {from: [TransitProvider], to: [InternetEdge, AutonomousSystem], description: Provider supplies external transit.}
  ANNOUNCES: {from: [BGPNeighbor, TransitProvider], to: [CustomerRoute, BGPRoute], description: Peer announces route.}
  TRIGGERS_BLACKHOLE: {from: [Community, RoutePolicy], to: [BlackholeRoute], description: Community or policy activates discard route.}
  EXPOSES_BGP_RISK: {from: [BGPRoute, RoutePolicy, RouteReflector, HotPotatoRouting, BlackholeRoute], to: [BGPPathRisk], description: BGP state or design exposes path risk.}

