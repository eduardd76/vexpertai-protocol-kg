dependency_rules:
  - id: bgp-process-device
    source: BGPProcess
    relationship: RUNS_ON
    target: [Device]
    rationale: BGP process resolves to its hosting device.
  - id: bgp-neighbor-process
    source: BGPNeighbor
    relationship: BELONGS_TO
    target: [BGPProcess]
    rationale: Neighbor state belongs to a specific process.
  - id: bgp-route-advertisement
    source: BGPRoute
    relationship: ADVERTISED_TO
    target: [BGPNeighbor]
    rationale: Advertisement lineage identifies the receiving peer.
  - id: bgp-best-path
    source: BGPRoute
    relationship: SELECTED_BY
    target: [BGPBestPathDecision]
    rationale: Selected route records ordered decision rationale.
  - id: route-policy-filter
    source: RoutePolicy
    relationship: FILTERS
    target: [BGPRoute]
    rationale: Route visibility traces to filtering policy.
  - id: prefix-list-prefix
    source: PrefixList
    relationship: MATCHES
    target: [Prefix]
    rationale: Policy match traces to exact prefix object.
  - id: community-policy
    source: Community
    relationship: INFLUENCES
    target: [RoutePolicy]
    rationale: Community semantics influence policy outcome.
  - id: route-reflector-client
    source: RouteReflector
    relationship: REFLECTS
    target: [BGPRoute]
    rationale: Reflected route lineage identifies reflector dependency.
  - id: bgp-pic-next-hop
    source: BGPPIC
    relationship: PROTECTS
    target: [NextHop, NextHopFailure]
    rationale: PIC precomputes alternate forwarding after edge or next-hop failure.
  - id: hot-potato-igp
    source: HotPotatoRouting
    relationship: DEPENDS_ON
    target: [IGPMetricToExit]
    rationale: Nearest-exit behavior follows IGP distance.
  - id: cold-potato-policy
    source: ColdPotatoRouting
    relationship: DEPENDS_ON
    target: [PolicyPreference]
    rationale: Distant-exit behavior follows explicit policy preference.
  - id: bgp-free-core-reachability
    source: BGPFreeCore
    relationship: REQUIRES
    target: [EdgeToEdgeReachability]
    rationale: Core can omit BGP only when edge next hops remain reachable.
  - id: bgp-next-hop-recursion
    source: BGPNextHop
    relationship: DEPENDS_ON
    target: [IGPReachability]
    rationale: BGP route usability requires recursive next-hop resolution.
  - id: service-selected-path
    source: ServiceReachability
    relationship: DEPENDS_ON
    target: [SelectedBGPPath]
    rationale: Service reachability traces to selected BGP path.

risk_rules:
  - id: route-policy-withdrawal
    applies_to: RoutePolicy
    when: recent policy change denies a previously advertised critical prefix
    severity: critical
    response: Validate diff, restore intended permit, and verify peer advertisement.
  - id: unreachable-bgp-next-hop
    applies_to: BGPNextHop
    when: recursive IGP or underlay reachability is down
    severity: critical
    response: Restore IGP reachability before changing BGP policy.
  - id: route-reflector-single-failure
    applies_to: RouteReflector
    when: clients have no alternate reflector for required prefixes
    severity: high
    response: Add reflection redundancy and validate client path visibility.
  - id: unexpected-hot-potato-exit
    applies_to: HotPotatoRouting
    when: IGP metric change moves traffic to an unintended exit
    severity: medium
    response: Validate IGP cost and policy intent before forcing BGP attributes.
  - id: community-blackhole-impact
    applies_to: BlackholeRoute
    when: blackhole community matches a service prefix unintentionally
    severity: critical
    response: Remove blackhole trigger and validate propagation scope.

validation_queries:
  - id: bgp-route-unreachable-next-hop
    description: Find BGP routes with failed recursive next-hop reachability.
    cypher: |
      MATCH (route:BGPRoute)-[:HAS_NEXT_HOP]->(nextHop:BGPNextHop)
            -[:DEPENDS_ON]->(igp:IGPReachability)
      WHERE igp.state = 'down'
      RETURN route.id, route.name, nextHop.address
  - id: reflected-route-single-rr
    description: Find reflected routes with only one reflector.
    cypher: |
      MATCH (rr:RouteReflector)-[:REFLECTS]->(route:BGPRoute)
      WITH route, count(DISTINCT rr) AS reflector_count
      WHERE reflector_count = 1
      RETURN route.id, route.name
  - id: selected-route-without-decision
    description: Find installed BGP routes without best-path rationale.
    cypher: |
      MATCH (route:BGPRoute {state: 'selected'})
      WHERE NOT (route)-[:SELECTED_BY]->(:BGPBestPathDecision)
      RETURN route.id, route.name

example_scenarios:
  - id: policy-prefix-withdrawal
    summary: Route-policy change removes a critical prefix advertisement.
  - id: next-hop-recursion-failure
    summary: BGP route is present but unusable because IGP next hop is unreachable.
  - id: route-reflector-failure
    summary: Reflector loss withdraws client prefixes.
  - id: hot-potato-exit-shift
    summary: IGP metric change moves traffic to an unexpected internet exit.
  - id: bgp-pic-protection
    summary: Precomputed alternate preserves service through edge failure.
  - id: community-blackhole
    summary: Blackhole community withdraws service reachability into discard.
