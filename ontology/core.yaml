  - {label: Interface, property: id, type: unique}
  - {label: Prefix, property: id, type: unique}
  - {label: BusinessService, property: id, type: unique}
  - {label: DesignDomain, property: id, type: unique}
  - {label: DesignDecision, property: id, type: unique}
  - {label: DesignRisk, property: id, type: unique}
  - {label: Evidence, property: id, type: unique}
  - {label: ValidationCheck, property: id, type: unique}
  - {label: Protocol, property: id, type: unique}
  - {label: Policy, property: id, type: unique}
  - {label: OverlayService, property: id, type: unique}
  - {label: ControlPlaneDependency, property: id, type: unique}
  - {label: DataPlaneDependency, property: id, type: unique}
  - {label: ServiceOwner, property: id, type: unique}
  - {label: UserGroup, property: id, type: unique}
  - {label: Region, property: id, type: unique}
  - {label: Role, property: id, type: unique}
