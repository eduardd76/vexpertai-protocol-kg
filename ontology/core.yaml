  - {label: TechnologyModule, property: id, type: unique}

dependency_rules:
  - id: service-dependency-must-be-explicit
    source: BusinessService
    relationship: DEPENDS_ON
    target: [Application, VRF, VNI, Prefix, VXLANOverlay]
    rationale: Service impact requires an explicit path to infrastructure or reachability.
  - id: decision-risk-validation-chain
    source: DesignDecision
    relationship: INTRODUCES_RISK
    target: [DesignRisk]
    rationale: Material decisions expose their risks, which can then be mitigated and validated.
  - id: overlay-control-plane-pattern
    source: OverlayService
    relationship: HAS_CONTROL_PLANE_DEPENDENCY
    target: [ControlPlaneDependency]
    rationale: Overlay control-plane state is represented consistently across technologies.
  - id: overlay-data-plane-pattern
    source: OverlayService
    relationship: HAS_DATA_PLANE_DEPENDENCY
    target: [DataPlaneDependency]
    rationale: Overlay forwarding state is represented consistently across technologies.

risk_rules:
  - id: unvalidated-high-risk-decision
    applies_to: DesignRisk
    when: severity is high and no VALIDATED_BY or MITIGATED_BY relationship exists
    severity: high
    response: Block implementation until a validation check and mitigation are linked.
  - id: failed-critical-dependency
    applies_to: ControlPlaneDependency
    when: status is failed and the dependency supports a critical business service
    severity: critical
    response: Follow evidence to the failed component and validate a bounded remediation.

validation_queries:
  - id: core-unmitigated-risks
    description: Find high risks with no mitigation.
    cypher: |
      MATCH (risk:DesignRisk)
      WHERE risk.severity = 'high' AND NOT (risk)-[:MITIGATED_BY]->()
      RETURN risk.id, risk.name
  - id: global-overlay-dependency-gaps
    description: Find overlay services without explicit control-plane or data-plane dependency patterns.
    cypher: |
      MATCH (overlay:OverlayService)
      WHERE NOT (overlay)-[:HAS_CONTROL_PLANE_DEPENDENCY]->()
         OR NOT (overlay)-[:HAS_DATA_PLANE_DEPENDENCY]->()
      RETURN overlay.id, overlay.name

example_scenarios:
  - id: design-decision-review
    summary: Review objectives, constraints, tradeoffs, risks, evidence, and validation before implementation.
  - id: end-to-end-payment-service
    summary: Trace Payment-App from physical access through routing, overlay, security, QoS, application, SLA, risk, and ownership.
